[oar]
base_url = "http://127.0.0.1:8000"
workspace_id = "ws_main"
workspace_name = "Main"
workspace_url = "http://127.0.0.1:3000"
verify_ssl = true

[auth]
state_path = ".state/hermes-auth.json"

[agent]
handle = "hermes"
driver_kind = "acp"
adapter_kind = "hermes_acp"
state_dir = ".state/hermes"
workspace_bindings = ["ws_main"]
resume_policy = "resume_or_create"
status = "active"

[adapter]
kind = "hermes_acp"
command = ["hermes", "acp"]
cwd_default = "/absolute/path/to/your/hermes/workspace"
auto_select_permission = true

[adapter.workspace_map]
ws_main = "/absolute/path/to/your/hermes/workspace"

[adapter.env]
HERMES_LOG_LEVEL = "INFO"
