[oar]
base_url = "http://127.0.0.1:8000"
workspace_id = "ws_main"
workspace_name = "Main"
workspace_url = "http://127.0.0.1:3000"
verify_ssl = true

[auth]
state_path = ".state/zeroclaw-auth.json"

[agent]
handle = "zeroclaw"
driver_kind = "http"
adapter_kind = "zeroclaw_gateway"
state_dir = ".state/zeroclaw"
workspace_bindings = ["ws_main"]
resume_policy = "resume_or_create"
status = "active"

[adapter]
kind = "zeroclaw_gateway"
base_url = "http://127.0.0.1:42617"
bearer_token = "REPLACE_WITH_ZEROCLAW_BEARER_TOKEN"
webhook_secret = ""
request_timeout_seconds = 600
session_header_name = "X-Session-Id"
