      tags: [workspaces]
      x-oar-surface: "utility"
      x-oar-command-id: "control.organizations.workspace-inventory.list"
      x-oar-cli-path: "organizations workspace-inventory list"
      x-oar-why: "Inspect workspace health, heartbeats, backups, and failed jobs from one support-friendly surface."
      x-oar-examples:
        - title: List workspace inventory
          command: "oar api call --base-url https://control.oar.example --method GET --path '/organizations/org_123/workspace-inventory' --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
