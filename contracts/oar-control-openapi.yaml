      responses:
        '200':
          description: Workspace inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInventoryResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

components:
  parameters:
    OrganizationID:
      in: path
      name: organization_id
      required: true
      schema:
        type: string
      description: Stable control-plane organization identifier.
    MembershipID:
      in: path
      name: membership_id
      required: true
      schema:
        type: string
      description: Stable organization membership identifier.
    InviteID:
      in: path
      name: invite_id
      required: true
      schema:
        type: string
      description: Stable organization invite identifier.
    WorkspaceID:
      in: path
      name: workspace_id
      required: true
      schema:
        type: string
      description: Stable workspace registry identifier.
    JobID:
      in: path
      name: job_id
      required: true
      schema:
        type: string
      description: Stable provisioning job identifier.
  responses:
    ErrorResponse:
      description: Error payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
          required: [code, message]
      required: [error]

    Account:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        display_name: { type: string }
        status:
          type: string
          enum: [active, disabled]
        created_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
      required: [id, email, display_name, status, created_at]

    AccountHint:
      type: object
      properties:
        email: { type: string }
        display_name: { type: string }
      required: [email]

    Session:
      type: object
      properties:
        id: { type: string }
        account_id: { type: string }
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        access_token: { type: string }
      required: [id, account_id, issued_at, expires_at, access_token]

    Organization:
      type: object
      properties:
        id: { type: string }
        slug: { type: string }
        display_name: { type: string }
        plan_tier:
          type: string
          enum: [starter, team, scale, enterprise]
        status:
          type: string
          enum: [active, suspended]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, slug, display_name, plan_tier, status, created_at, updated_at]

    BillingAccount:
      type: object
      properties:
        organization_id: { type: string }
        provider:
          type: string
          enum: [stripe]
        billing_status:
          type: string
          enum: [free, not_started, trialing, active, past_due, canceled, incomplete, incomplete_expired, unpaid, paused]
        stripe_customer_id: { type: string }
        stripe_subscription_id: { type: string }
        stripe_price_id: { type: string }
        stripe_subscription_status: { type: string }
        current_period_end:
          type: string
          format: date-time
        cancel_at_period_end:
          type: boolean
        last_webhook_event_id: { type: string }
        last_webhook_event_type: { type: string }
        last_webhook_received_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [organization_id, provider, billing_status, stripe_customer_id, stripe_subscription_id, stripe_price_id, stripe_subscription_status, cancel_at_period_end, last_webhook_event_id, last_webhook_event_type, created_at, updated_at]

    BillingConfiguration:
      type: object
      properties:
        provider:
          type: string
          enum: [stripe]
        configured:
          type: boolean
        publishable_key_configured:
          type: boolean
        secret_key_configured:
          type: boolean
        webhook_secret_configured:
          type: boolean
        checkout_configured:
          type: boolean
        customer_portal_configured:
          type: boolean
        plan_price_ids:
          type: object
          additionalProperties:
            type: string
        missing_configuration:
          type: array
          items:
            type: string
      required: [provider, configured, publishable_key_configured, secret_key_configured, webhook_secret_configured, checkout_configured, customer_portal_configured, plan_price_ids, missing_configuration]

    BillingSummary:
      type: object
      properties:
        organization_id: { type: string }
        plan_tier:
          type: string
          enum: [starter, team, scale, enterprise]
        billing_account:
          $ref: '#/components/schemas/BillingAccount'
        usage_summary:
          $ref: '#/components/schemas/UsageSummary'
        configuration:
          $ref: '#/components/schemas/BillingConfiguration'
      required: [organization_id, plan_tier, billing_account, usage_summary, configuration]

    BillingActionSession:
      type: object
      properties:
        provider:
          type: string
          enum: [stripe]
        mode:
          type: string
          enum: [checkout, customer_portal]
        status:
          type: string
          enum: [configuration_required, created]
        plan_tier:
          type: string
          enum: [starter, team, scale, enterprise]
        url:
          type: string
          format: uri
        missing_configuration:
          type: array
          items:
            type: string
        note:
          type: string
      required: [provider, mode, status, missing_configuration]

    StripeWebhookReceipt:
      type: object
      properties:
        received:
          type: boolean
        event_id:
          type: string
        event_type:
          type: string
        verification_status:
          type: string
          enum: [skipped, verified]
        organization_id:
          type: string
      required: [received, event_id, event_type, verification_status]

    Membership:
      type: object
      properties:
        id: { type: string }
        organization_id: { type: string }
        account_id: { type: string }
        role:
          type: string
          enum: [owner, admin, member, viewer]
        status:
          type: string
          enum: [active, disabled]
        created_at:
          type: string
          format: date-time
      required: [id, organization_id, account_id, role, status, created_at]

    OrganizationInvite:
      type: object
      properties:
        id: { type: string }
        organization_id: { type: string }
        email: { type: string }
        role:
          type: string
          enum: [admin, member, viewer]
        status:
          type: string
          enum: [pending, accepted, revoked, expired]
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
      required: [id, organization_id, email, role, status, created_at, expires_at]

    Workspace:
      type: object
      properties:
        id: { type: string }
        organization_id: { type: string }
        slug: { type: string }
        display_name: { type: string }
        status:
          type: string
          enum: [provisioning, ready, suspended, degraded, archived]
        region: { type: string }
        workspace_tier:
          type: string
          enum: [standard, plus, dedicated]
        workspace_path:
          type: string
          description: Relative human-app path preserving the workspace noun, such as `/acme-ops`.
        base_url:
          type: string
          format: uri
        public_origin:
          type: string
          format: uri
        core_origin:
          type: string
          format: uri
        deployment_root:
          type: string
        instance_id:
          type: string
        service_identity_id:
          type: string
        service_identity_public_key:
          type: string
        desired_state:
          type: string
          enum: [provisioning, ready, suspended, archived]
        desired_version:
          type: string
        quota_config_ref:
          type: string
        quota_envelope_ref:
          type: string
        deployed_version:
          type: string
        routing_manifest_path:
          type: string
        last_heartbeat_at:
          type: string
          format: date-time
        heartbeat_version:
          type: string
        heartbeat_build:
          type: string
        heartbeat_health_summary:
          type: object
          additionalProperties: true
        heartbeat_projection_maintenance_summary:
          type: object
          additionalProperties: true
        heartbeat_usage_summary:
          $ref: '#/components/schemas/WorkspaceUsageSummary'
        last_successful_backup_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, organization_id, slug, display_name, status, region, workspace_tier, workspace_path, base_url, public_origin, core_origin, deployment_root, instance_id, desired_state, desired_version, quota_config_ref, quota_envelope_ref, deployed_version, routing_manifest_path, created_at, updated_at]

    WorkspaceRoutingManifest:
      type: object
      properties:
        workspace_id: { type: string }
        organization_id: { type: string }
        slug: { type: string }
        workspace_path:
          type: string
        public_origin:
          type: string
          format: uri
        base_url:
          type: string
          format: uri
        core_origin:
          type: string
          format: uri
        deployment_root:
          type: string
        instance_id:
          type: string
        current_state:
          type: string
        desired_state:
          type: string
        current_version:
          type: string
        desired_version:
          type: string
        quota_config_ref:
          type: string
        quota_envelope_ref:
          type: string
        deployed_version:
          type: string
        routing_manifest_path:
          type: string
        generated_at:
          type: string
          format: date-time
      required: [workspace_id, organization_id, slug, workspace_path, public_origin, base_url, core_origin, deployment_root, instance_id, current_state, desired_state, current_version, desired_version, quota_config_ref, quota_envelope_ref, deployed_version, routing_manifest_path, generated_at]

    ProvisioningJob:
      type: object
      properties:
        id: { type: string }
        organization_id: { type: string }
        workspace_id: { type: string }
        kind:
          type: string
          enum: [workspace_create, workspace_suspend, workspace_resume, workspace_restore, workspace_replace, workspace_decommission, workspace_repair, workspace_backup, workspace_upgrade, workspace_restore_drill]
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        requested_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        failure_reason:
          type: string
        progress_message:
          type: string
        stdout_tail:
          type: string
        stderr_tail:
          type: string
        retryable:
          type: boolean
        parameters:
          type: object
          additionalProperties: true
        result:
          type: object
          additionalProperties: true
      required: [id, organization_id, workspace_id, kind, status, requested_at]

    WorkspaceLaunchSession:
      type: object
      properties:
        launch_id: { type: string }
        workspace_id: { type: string }
        workspace_path: { type: string }
        workspace_url:
          type: string
          format: uri
        return_path: { type: string }
        exchange_token: { type: string }
        expires_at:
          type: string
          format: date-time
      required: [launch_id, workspace_id, workspace_path, workspace_url, exchange_token, expires_at]

    WorkspaceGrant:
      type: object
      properties:
        kind:
          type: string
          enum: [human-session]
        bearer_token: { type: string }
        expires_at:
          type: string
          format: date-time
        scope:
          type: string
      required: [kind, bearer_token, expires_at, scope]

    UsagePlan:
      type: object
      properties:
        id: { type: string }
        display_name: { type: string }
        workspace_limit:
          type: integer
        human_seat_limit:
          type: integer
        included_storage_gb:
          type: integer
      required: [id, display_name, workspace_limit, human_seat_limit, included_storage_gb]

    UsageMeter:
      type: object
      properties:
        workspace_count:
          type: integer
        human_seat_count:
          type: integer
        storage_gb:
          type: integer
        monthly_launch_count:
          type: integer
      required: [workspace_count, human_seat_count, storage_gb, monthly_launch_count]

    UsageQuota:
      type: object
      properties:
        workspaces_remaining:
          type: integer
        human_seats_remaining:
          type: integer
        storage_gb_remaining:
          type: integer
      required: [workspaces_remaining, human_seats_remaining, storage_gb_remaining]

    UsageSummary:
      type: object
      properties:
        organization_id: { type: string }
        plan:
          $ref: '#/components/schemas/UsagePlan'
        usage:
          $ref: '#/components/schemas/UsageMeter'
        quota:
          $ref: '#/components/schemas/UsageQuota'
      required: [organization_id, plan, usage, quota]

    WorkspaceUsage:
      type: object
      properties:
        blob_bytes:
          type: integer
        blob_objects:
          type: integer
        artifact_count:
          type: integer
        document_count:
          type: integer
        document_revision_count:
          type: integer
      required: [blob_bytes, blob_objects, artifact_count, document_count, document_revision_count]

    WorkspaceQuota:
      type: object
      properties:
        max_blob_bytes:
          type: integer
        max_artifacts:
          type: integer
        max_documents:
          type: integer
        max_document_revisions:
          type: integer
        max_upload_bytes:
          type: integer
      required: [max_blob_bytes, max_artifacts, max_documents, max_document_revisions, max_upload_bytes]

    WorkspaceUsageSummary:
      type: object
      properties:
        usage:
          $ref: '#/components/schemas/WorkspaceUsage'
        quota:
          $ref: '#/components/schemas/WorkspaceQuota'
        generated_at:
          type: string
          format: date-time
      required: [usage, quota, generated_at]

    WorkspaceHeartbeatRequest:
      type: object
      properties:
        version:
          type: string
        build:
          type: string
        health_summary:
          type: object
          additionalProperties: true
        projection_maintenance_summary:
          type: object
          additionalProperties: true
        usage_summary:
          $ref: '#/components/schemas/WorkspaceUsageSummary'
        last_successful_backup_at:
          type: string
          format: date-time
      required: [version, build, health_summary, projection_maintenance_summary, usage_summary]

    StartPasskeyRegistrationRequest:
      type: object
      properties:
        email: { type: string }
        display_name: { type: string }
      required: [email, display_name]

    StartPasskeyRegistrationResponse:
      type: object
      properties:
        registration_session_id: { type: string }
        public_key_options:
          type: object
          additionalProperties: true
        account:
          $ref: '#/components/schemas/Account'
      required: [registration_session_id, public_key_options, account]

    FinishPasskeyRegistrationRequest:
      type: object
      properties:
        registration_session_id: { type: string }
        invite_token: { type: string }
        credential:
          type: object
          additionalProperties: true
      required: [registration_session_id, credential]

    StartAccountSessionRequest:
      type: object
      properties:
        email: { type: string }
      required: [email]

    StartAccountSessionResponse:
      type: object
      properties:
        session_id: { type: string }
        public_key_options:
          type: object
          additionalProperties: true
        account_hint:
