openapi: 3.1.0
info:
  title: Organization Autorunner Control Plane HTTP API
  version: 0.1.0
  description: |
    Canonical control-plane HTTP contract for Organization Autorunner SaaS v-next.

    This surface owns shared human accounts, organizations, workspace registry,
    provisioning lifecycle, launch brokering, and usage envelopes. Workspace core
    APIs remain isolated per workspace and are not replaced by this contract.
servers:
  - url: http://127.0.0.1:8100
x-oar-extension-vocabulary:
  x-oar-command-id: "Stable command identifier (for example: control.organizations.list)"
  x-oar-cli-path: "CLI path segments (for example: organizations list)"
  x-oar-why: "Why the command exists and when an agent should use it"
  x-oar-examples: "Deterministic examples for humans and agents"
  x-oar-input-mode: "none | json-body | raw-stream | file-and-body"
  x-oar-streaming: "Streaming characteristics for this operation"
  x-oar-output-envelope: "Output shape and stability notes"
  x-oar-error-codes: "Stable semantic error codes surfaced by the control plane"
  x-oar-concepts: "Concept tags for docs/help grouping"
  x-oar-stability: "experimental | beta | stable"
  x-oar-surface: "Surface classification: canonical, projection, or utility"
  x-oar-agent-notes: "Idempotency, retries, and protocol caveats"
paths:
  /account/passkeys/registrations/start:
    post:
      operationId: startControlPasskeyRegistration
      summary: Start control-plane passkey registration
      tags: [accounts]
      x-oar-surface: "utility"
      x-oar-command-id: "control.accounts.passkeys.register.start"
      x-oar-cli-path: "accounts passkeys register start"
      x-oar-why: "Begin managed human-account registration in the control plane before any workspace-specific grant is issued."
      x-oar-examples:
        - title: Start account registration
          command: "oar api call --base-url https://control.oar.example --method POST --path /account/passkeys/registrations/start --body '{\"email\":\"ops@example.com\",\"display_name\":\"Ops Lead\"}'"
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ registration_session_id, public_key_options, account }`."
      x-oar-error-codes: [invalid_json, invalid_request, account_exists]
      x-oar-concepts: [control-auth, passkeys, accounts]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Human-driven WebAuthn ceremony. Retry by starting a new registration session when the browser ceremony expires."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartPasskeyRegistrationRequest'
      responses:
        '200':
          description: Passkey registration challenge started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartPasskeyRegistrationResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /account/passkeys/registrations/finish:
    post:
      operationId: finishControlPasskeyRegistration
      summary: Finish control-plane passkey registration
      tags: [accounts]
      x-oar-surface: "utility"
      x-oar-command-id: "control.accounts.passkeys.register.finish"
      x-oar-cli-path: "accounts passkeys register finish"
      x-oar-why: "Verify the WebAuthn attestation and issue the initial control-plane account session."
      x-oar-examples:
        - title: Finish account registration
          command: "oar api call --base-url https://control.oar.example --method POST --path /account/passkeys/registrations/finish --body @registration-finish.json"
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ account, session }` after successful attestation."
      x-oar-error-codes: [invalid_json, invalid_request, session_expired, credential_invalid]
      x-oar-concepts: [control-auth, passkeys, sessions]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Registration session ids are short-lived and one-time use."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinishPasskeyRegistrationRequest'
      responses:
        '200':
          description: Account registration completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSessionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /account/sessions/start:
    post:
      operationId: startControlAccountSession
      summary: Start control-plane account session sign-in
      tags: [accounts]
      x-oar-surface: "utility"
      x-oar-command-id: "control.accounts.sessions.start"
      x-oar-cli-path: "accounts sessions start"
      x-oar-why: "Create a short-lived control-plane sign-in ceremony for an existing human account."
      x-oar-examples:
        - title: Start control-plane sign-in
          command: "oar api call --base-url https://control.oar.example --method POST --path /account/sessions/start --body '{\"email\":\"ops@example.com\"}'"
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ session_id, public_key_options, account_hint }`."
      x-oar-error-codes: [invalid_json, invalid_request, not_found, account_disabled]
      x-oar-concepts: [control-auth, sessions, passkeys]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Use only for human account sign-in. Agents remain workspace-local and do not use this flow."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAccountSessionRequest'
      responses:
        '200':
          description: Sign-in challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartAccountSessionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /account/sessions/finish:
    post:
      operationId: finishControlAccountSession
      summary: Finish control-plane account session sign-in
      tags: [accounts]
      x-oar-surface: "utility"
      x-oar-command-id: "control.accounts.sessions.finish"
      x-oar-cli-path: "accounts sessions finish"
      x-oar-why: "Verify the WebAuthn assertion and issue a control-plane session for later organization and workspace actions."
      x-oar-examples:
        - title: Finish control-plane sign-in
          command: "oar api call --base-url https://control.oar.example --method POST --path /account/sessions/finish --body @session-finish.json"
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ account, session }`."
      x-oar-error-codes: [invalid_json, invalid_request, session_expired, credential_invalid]
      x-oar-concepts: [control-auth, sessions, passkeys]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Short-lived one-time session ids. Do not retry with the same signed assertion after a transport failure unless the caller is sure it was not accepted."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinishAccountSessionRequest'
      responses:
        '200':
          description: Session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSessionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /account/sessions/current:
    delete:
      operationId: revokeCurrentControlAccountSession
      summary: Revoke current control-plane account session
      tags: [accounts]
      x-oar-surface: "utility"
      x-oar-command-id: "control.accounts.sessions.revoke-current"
      x-oar-cli-path: "accounts sessions revoke-current"
      x-oar-why: "Allow a human to explicitly end their current control-plane browser or API session."
      x-oar-examples:
        - title: Revoke current session
          command: "oar api call --base-url https://control.oar.example --method DELETE --path /account/sessions/current --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ revoked: true }`."
      x-oar-error-codes: [auth_required, invalid_token]
      x-oar-concepts: [control-auth, sessions]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Idempotent from the caller perspective. Safe to call during logout cleanup."
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRevocationResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /organizations:
    get:
      operationId: listControlOrganizations
      summary: List control-plane organizations
      tags: [organizations]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.organizations.list"
      x-oar-cli-path: "organizations list"
      x-oar-why: "Load the organization registry visible to the current human account."
      x-oar-examples:
        - title: List organizations
          command: "oar api call --base-url https://control.oar.example --method GET --path /organizations --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ organizations }` ordered by create time ascending."
      x-oar-error-codes: [auth_required, invalid_token]
      x-oar-concepts: [organizations, tenancy]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      responses:
        '200':
          description: Organization list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationsResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    post:
      operationId: createControlOrganization
      summary: Create control-plane organization
      tags: [organizations]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.organizations.create"
      x-oar-cli-path: "organizations create"
      x-oar-why: "Create the durable top-level SaaS organization record before provisioning any isolated workspace core."
      x-oar-examples:
        - title: Create organization
          command: "oar api call --base-url https://control.oar.example --method POST --path /organizations --body '{\"slug\":\"acme\",\"display_name\":\"Acme\",\"plan_tier\":\"team\"}' --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ organization, membership }` for the creator."
      x-oar-error-codes: [auth_required, invalid_token, invalid_json, invalid_request, slug_conflict]
      x-oar-concepts: [organizations, tenancy, billing]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Not idempotent by default. Repeat only with an application-level idempotency key outside this contract."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationCreateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /organizations/{organization_id}:
    get:
      operationId: getControlOrganization
      summary: Get control-plane organization
      tags: [organizations]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.organizations.get"
      x-oar-cli-path: "organizations get"
      x-oar-why: "Read one organization's control-plane configuration, plan, and lifecycle state."
      x-oar-examples:
        - title: Get organization
          command: "oar api call --base-url https://control.oar.example --method GET --path /organizations/org_123 --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ organization }`."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [organizations, tenancy]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      parameters:
        - $ref: '#/components/parameters/OrganizationID'
      responses:
        '200':
          description: Organization found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      operationId: updateControlOrganization
      summary: Update control-plane organization
      tags: [organizations]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.organizations.update"
      x-oar-cli-path: "organizations update"
      x-oar-why: "Adjust organization display, plan, or lifecycle flags without changing workspace-local data."
      x-oar-examples:
        - title: Update organization plan
          command: "oar api call --base-url https://control.oar.example --method PATCH --path /organizations/org_123 --body '{\"plan_tier\":\"scale\"}' --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ organization }` with updated control-plane fields."
      x-oar-error-codes: [auth_required, invalid_token, invalid_json, invalid_request, not_found]
      x-oar-concepts: [organizations, billing, lifecycle]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Patch semantics. Omitted fields are left unchanged."
      parameters:
        - $ref: '#/components/parameters/OrganizationID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /organizations/{organization_id}/memberships:
    get:
      operationId: listControlOrganizationMemberships
      summary: List organization memberships
      tags: [organizations]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.organizations.memberships.list"
      x-oar-cli-path: "organizations memberships list"
      x-oar-why: "Inspect which control-plane human accounts can access an organization and at what role."
      x-oar-examples:
        - title: List memberships
          command: "oar api call --base-url https://control.oar.example --method GET --path /organizations/org_123/memberships --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ memberships }`."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [organizations, memberships, access]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      parameters:
        - $ref: '#/components/parameters/OrganizationID'
      responses:
        '200':
          description: Memberships listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipsResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /organizations/{organization_id}/memberships/{membership_id}:
    patch:
      operationId: updateControlOrganizationMembership
      summary: Update organization membership
      tags: [organizations]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.organizations.memberships.update"
      x-oar-cli-path: "organizations memberships update"
      x-oar-why: "Change an existing member's role or disable their organization grant without touching workspace-local principals."
      x-oar-examples:
        - title: Promote organization member
          command: "oar api call --base-url https://control.oar.example --method PATCH --path /organizations/org_123/memberships/mem_123 --body '{\"role\":\"owner\"}' --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ membership }`."
      x-oar-error-codes: [auth_required, invalid_token, invalid_json, invalid_request, not_found]
      x-oar-concepts: [organizations, memberships, access]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Patch semantics. Workspace access after update still depends on launch/session exchange grants."
      parameters:
        - $ref: '#/components/parameters/OrganizationID'
        - $ref: '#/components/parameters/MembershipID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMembershipRequest'
      responses:
        '200':
          description: Membership updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /organizations/{organization_id}/invites:
    get:
      operationId: listControlOrganizationInvites
      summary: List organization invites
      tags: [organizations]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.organizations.invites.list"
      x-oar-cli-path: "organizations invites list"
      x-oar-why: "Inspect pending or completed control-plane organization invites without exposing secrets beyond the invite link created at issuance time."
      x-oar-examples:
        - title: List org invites
          command: "oar api call --base-url https://control.oar.example --method GET --path /organizations/org_123/invites --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ invites }`."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [organizations, invites, access]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      parameters:
        - $ref: '#/components/parameters/OrganizationID'
      responses:
        '200':
          description: Invites listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationInvitesResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
    post:
      operationId: createControlOrganizationInvite
      summary: Create organization invite
      tags: [organizations]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.organizations.invites.create"
      x-oar-cli-path: "organizations invites create"
      x-oar-why: "Invite a control-plane human account into an organization before that human launches any isolated workspace."
      x-oar-examples:
        - title: Invite organization admin
          command: "oar api call --base-url https://control.oar.example --method POST --path /organizations/org_123/invites --body '{\"email\":\"finance@example.com\",\"role\":\"admin\"}' --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ invite, invite_url }`. The invite URL is returned only at creation time."
      x-oar-error-codes: [auth_required, invalid_token, invalid_json, invalid_request, not_found, invite_conflict]
      x-oar-concepts: [organizations, invites, access]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Treat invite URLs as secrets. Reissuing an invite should create a new record instead of mutating the old secret."
      parameters:
        - $ref: '#/components/parameters/OrganizationID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationInviteRequest'
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationInviteCreateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /organizations/{organization_id}/invites/{invite_id}/revoke:
    post:
      operationId: revokeControlOrganizationInvite
      summary: Revoke organization invite
      tags: [organizations]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.organizations.invites.revoke"
      x-oar-cli-path: "organizations invites revoke"
      x-oar-why: "Invalidate a pending control-plane organization invite before it is accepted."
      x-oar-examples:
        - title: Revoke org invite
          command: "oar api call --base-url https://control.oar.example --method POST --path /organizations/org_123/invites/inv_123/revoke --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ invite }` with updated lifecycle fields."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [organizations, invites, access]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Idempotent if the invite is already revoked."
      parameters:
        - $ref: '#/components/parameters/OrganizationID'
        - $ref: '#/components/parameters/InviteID'
      responses:
        '200':
          description: Invite revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationInviteResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /workspaces:
    get:
      operationId: listControlWorkspaces
      summary: List workspace registry entries
      tags: [workspaces]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.workspaces.list"
      x-oar-cli-path: "workspaces list"
      x-oar-why: "Read the control-plane registry of isolated workspaces without crossing the workspace data boundary."
      x-oar-examples:
        - title: List workspaces for an organization
          command: "oar api call --base-url https://control.oar.example --method GET --path '/workspaces?organization_id=org_123' --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ workspaces }`."
      x-oar-error-codes: [auth_required, invalid_token]
      x-oar-concepts: [workspaces, registry, tenancy]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      parameters:
        - in: query
          name: organization_id
          required: false
          schema:
            type: string
          description: Optional organization filter.
      responses:
        '200':
          description: Workspaces listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacesResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    post:
      operationId: createControlWorkspace
      summary: Create workspace registry entry and provisioning job
      tags: [workspaces]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.workspaces.create"
      x-oar-cli-path: "workspaces create"
      x-oar-why: "Allocate a new isolated workspace core under an organization and queue its provisioning lifecycle."
      x-oar-examples:
        - title: Provision workspace
          command: "oar api call --base-url https://control.oar.example --method POST --path /workspaces --body '{\"organization_id\":\"org_123\",\"slug\":\"ops\",\"display_name\":\"Ops\",\"region\":\"us-central1\",\"workspace_tier\":\"standard\"}' --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ workspace, provisioning_job }`."
      x-oar-error-codes: [auth_required, invalid_token, invalid_json, invalid_request, not_found, slug_conflict, quota_exceeded]
      x-oar-concepts: [workspaces, provisioning, registry]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Creates registry state and queues background provisioning. The workspace is not ready for launch until the job succeeds."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Workspace creation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceCreateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'

  /workspaces/{workspace_id}:
    get:
      operationId: getControlWorkspace
      summary: Get workspace registry entry
      tags: [workspaces]
      x-oar-surface: "canonical"
      x-oar-command-id: "control.workspaces.get"
      x-oar-cli-path: "workspaces get"
      x-oar-why: "Read one workspace registry record and its current lifecycle summary."
      x-oar-examples:
        - title: Read workspace
          command: "oar api call --base-url https://control.oar.example --method GET --path /workspaces/ws_123 --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ workspace }`."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [workspaces, registry]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
      responses:
        '200':
          description: Workspace found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /provisioning/jobs/{job_id}:
    get:
      operationId: getControlProvisioningJob
      summary: Get provisioning job status
      tags: [workspaces]
      x-oar-surface: "utility"
      x-oar-command-id: "control.provisioning.jobs.get"
      x-oar-cli-path: "provisioning jobs get"
      x-oar-why: "Poll provisioning and lifecycle jobs that create, repair, or replace isolated workspace cores."
      x-oar-examples:
        - title: Poll provisioning job
          command: "oar api call --base-url https://control.oar.example --method GET --path /provisioning/jobs/job_123 --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ job }`."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [provisioning, lifecycle, workspaces]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent. Use polling or backoff; the contract does not require a watch stream yet."
      parameters:
        - $ref: '#/components/parameters/JobID'
      responses:
        '200':
          description: Provisioning job found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisioningJobResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /workspaces/{workspace_id}/launch-sessions:
    post:
      operationId: createControlWorkspaceLaunchSession
      summary: Create workspace launch session
      tags: [workspaces]
      x-oar-surface: "utility"
      x-oar-command-id: "control.workspaces.launch-sessions.create"
      x-oar-cli-path: "workspaces launch-sessions create"
      x-oar-why: "Broker human entry into an isolated workspace UI from the control plane without moving workspace identity into the control plane data plane."
      x-oar-examples:
        - title: Launch workspace UI
          command: "oar api call --base-url https://control.oar.example --method POST --path /workspaces/ws_123/launch-sessions --body '{\"return_path\":\"/ws/ops/threads\"}' --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ launch_session }` including `workspace_path` and one-time exchange token metadata."
      x-oar-error-codes: [auth_required, invalid_token, invalid_json, invalid_request, not_found, workspace_not_ready]
      x-oar-concepts: [workspaces, launch, grants]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Launch sessions are for humans. Agents stay workspace-local and should authenticate directly against the workspace core."
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceLaunchSessionRequest'
      responses:
        '200':
          description: Launch session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceLaunchSessionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /workspaces/{workspace_id}/session-exchange:
    post:
      operationId: exchangeControlWorkspaceSession
      summary: Exchange launch token for workspace-scoped grant
      tags: [workspaces]
      x-oar-surface: "utility"
      x-oar-command-id: "control.workspaces.session-exchange.create"
      x-oar-cli-path: "workspaces session-exchange create"
      x-oar-why: "Convert a control-plane launch token into a workspace-scoped session grant that the isolated workspace core can trust."
      x-oar-examples:
        - title: Exchange launch token
          command: "oar api call --base-url https://control.oar.example --method POST --path /workspaces/ws_123/session-exchange --body '{\"exchange_token\":\"<token>\"}'"
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ workspace, grant }` for the target workspace."
      x-oar-error-codes: [invalid_json, invalid_request, not_found, exchange_expired, exchange_invalid, workspace_not_ready]
      x-oar-concepts: [workspaces, grants, launch]
      x-oar-stability: "beta"
      x-oar-agent-notes: "One-time token exchange. The returned grant is scoped to one workspace and must not be reused across workspaces."
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceSessionExchangeRequest'
      responses:
        '200':
          description: Workspace grant issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSessionExchangeResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /organizations/{organization_id}/usage-summary:
    get:
      operationId: getControlOrganizationUsageSummary
      summary: Get organization usage and plan summary
      tags: [usage]
      x-oar-surface: "projection"
      x-oar-command-id: "control.organizations.usage-summary.get"
      x-oar-cli-path: "organizations usage-summary get"
      x-oar-why: "Expose plan and quota envelopes from the control plane without mixing them into workspace-local durable truth."
      x-oar-examples:
        - title: Get usage summary
          command: "oar api call --base-url https://control.oar.example --method GET --path /organizations/org_123/usage-summary --header 'Authorization: Bearer <control-session>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ summary }` with plan, usage, and remaining quota fields."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [usage, plans, quotas]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent. This is a control-plane summary, not a billing invoice."
      parameters:
        - $ref: '#/components/parameters/OrganizationID'
      responses:
        '200':
          description: Usage summary found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSummaryResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

components:
  parameters:
    OrganizationID:
      in: path
      name: organization_id
      required: true
      schema:
        type: string
      description: Stable control-plane organization identifier.
    MembershipID:
      in: path
      name: membership_id
      required: true
      schema:
        type: string
      description: Stable organization membership identifier.
    InviteID:
      in: path
      name: invite_id
      required: true
      schema:
        type: string
      description: Stable organization invite identifier.
    WorkspaceID:
      in: path
      name: workspace_id
      required: true
      schema:
        type: string
      description: Stable workspace registry identifier.
    JobID:
      in: path
      name: job_id
      required: true
      schema:
        type: string
      description: Stable provisioning job identifier.
  responses:
    ErrorResponse:
      description: Error payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
          required: [code, message]
      required: [error]

    Account:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        display_name: { type: string }
        status:
          type: string
          enum: [active, disabled]
        created_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
      required: [id, email, display_name, status, created_at]

    AccountHint:
      type: object
      properties:
        email: { type: string }
        display_name: { type: string }
      required: [email]

    Session:
      type: object
      properties:
        id: { type: string }
        account_id: { type: string }
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        access_token: { type: string }
      required: [id, account_id, issued_at, expires_at, access_token]

    Organization:
      type: object
      properties:
        id: { type: string }
        slug: { type: string }
        display_name: { type: string }
        plan_tier:
          type: string
          enum: [starter, team, scale, enterprise]
        status:
          type: string
          enum: [active, suspended]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, slug, display_name, plan_tier, status, created_at, updated_at]

    Membership:
      type: object
      properties:
        id: { type: string }
        organization_id: { type: string }
        account_id: { type: string }
        role:
          type: string
          enum: [owner, admin, member, viewer]
        status:
          type: string
          enum: [active, disabled]
        created_at:
          type: string
          format: date-time
      required: [id, organization_id, account_id, role, status, created_at]

    OrganizationInvite:
      type: object
      properties:
        id: { type: string }
        organization_id: { type: string }
        email: { type: string }
        role:
          type: string
          enum: [admin, member, viewer]
        status:
          type: string
          enum: [pending, accepted, revoked, expired]
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
      required: [id, organization_id, email, role, status, created_at, expires_at]

    Workspace:
      type: object
      properties:
        id: { type: string }
        organization_id: { type: string }
        slug: { type: string }
        display_name: { type: string }
        status:
          type: string
          enum: [provisioning, ready, degraded, archived]
        region: { type: string }
        workspace_tier:
          type: string
          enum: [standard, plus, dedicated]
        workspace_path:
          type: string
          description: Relative human-app path preserving the workspace noun, such as `/acme-ops`.
        base_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, organization_id, slug, display_name, status, region, workspace_tier, workspace_path, base_url, created_at, updated_at]

    ProvisioningJob:
      type: object
      properties:
        id: { type: string }
        organization_id: { type: string }
        workspace_id: { type: string }
        kind:
          type: string
          enum: [workspace_create, workspace_replace, workspace_repair]
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        requested_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        failure_reason:
          type: string
      required: [id, organization_id, workspace_id, kind, status, requested_at]

    WorkspaceLaunchSession:
      type: object
      properties:
        launch_id: { type: string }
        workspace_id: { type: string }
        workspace_path: { type: string }
        workspace_url:
          type: string
          format: uri
        return_path: { type: string }
        exchange_token: { type: string }
        expires_at:
          type: string
          format: date-time
      required: [launch_id, workspace_id, workspace_path, workspace_url, exchange_token, expires_at]

    WorkspaceGrant:
      type: object
      properties:
        kind:
          type: string
          enum: [human-session]
        bearer_token: { type: string }
        expires_at:
          type: string
          format: date-time
        scope:
          type: string
      required: [kind, bearer_token, expires_at, scope]

    UsagePlan:
      type: object
      properties:
        id: { type: string }
        display_name: { type: string }
        workspace_limit:
          type: integer
        human_seat_limit:
          type: integer
        included_storage_gb:
          type: integer
      required: [id, display_name, workspace_limit, human_seat_limit, included_storage_gb]

    UsageMeter:
      type: object
      properties:
        workspace_count:
          type: integer
        human_seat_count:
          type: integer
        storage_gb:
          type: integer
        monthly_launch_count:
          type: integer
      required: [workspace_count, human_seat_count, storage_gb, monthly_launch_count]

    UsageQuota:
      type: object
      properties:
        workspaces_remaining:
          type: integer
        human_seats_remaining:
          type: integer
        storage_gb_remaining:
          type: integer
      required: [workspaces_remaining, human_seats_remaining, storage_gb_remaining]

    UsageSummary:
      type: object
      properties:
        organization_id: { type: string }
        plan:
          $ref: '#/components/schemas/UsagePlan'
        usage:
          $ref: '#/components/schemas/UsageMeter'
        quota:
          $ref: '#/components/schemas/UsageQuota'
      required: [organization_id, plan, usage, quota]

    StartPasskeyRegistrationRequest:
      type: object
      properties:
        email: { type: string }
        display_name: { type: string }
      required: [email, display_name]

    StartPasskeyRegistrationResponse:
      type: object
      properties:
        registration_session_id: { type: string }
        public_key_options:
          type: object
          additionalProperties: true
        account:
          $ref: '#/components/schemas/Account'
      required: [registration_session_id, public_key_options, account]

    FinishPasskeyRegistrationRequest:
      type: object
      properties:
        registration_session_id: { type: string }
        credential:
          type: object
          additionalProperties: true
      required: [registration_session_id, credential]

    StartAccountSessionRequest:
      type: object
      properties:
        email: { type: string }
      required: [email]

    StartAccountSessionResponse:
      type: object
      properties:
        session_id: { type: string }
        public_key_options:
          type: object
          additionalProperties: true
        account_hint:
          $ref: '#/components/schemas/AccountHint'
      required: [session_id, public_key_options, account_hint]

    FinishAccountSessionRequest:
      type: object
      properties:
        session_id: { type: string }
        credential:
          type: object
          additionalProperties: true
      required: [session_id, credential]

    AccountSessionResponse:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/Account'
        session:
          $ref: '#/components/schemas/Session'
      required: [account, session]

    SessionRevocationResponse:
      type: object
      properties:
        revoked:
          type: boolean
      required: [revoked]

    CreateOrganizationRequest:
      type: object
      properties:
        slug: { type: string }
        display_name: { type: string }
        plan_tier:
          type: string
          enum: [starter, team, scale, enterprise]
      required: [slug, display_name, plan_tier]

    UpdateOrganizationRequest:
      type: object
      properties:
        display_name: { type: string }
        plan_tier:
          type: string
          enum: [starter, team, scale, enterprise]
        status:
          type: string
          enum: [active, suspended]

    OrganizationResponse:
      type: object
      properties:
        organization:
          $ref: '#/components/schemas/Organization'
      required: [organization]

    OrganizationsResponse:
      type: object
      properties:
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
      required: [organizations]

    OrganizationCreateResponse:
      type: object
      properties:
        organization:
          $ref: '#/components/schemas/Organization'
        membership:
          $ref: '#/components/schemas/Membership'
      required: [organization, membership]

    MembershipResponse:
      type: object
      properties:
        membership:
          $ref: '#/components/schemas/Membership'
      required: [membership]

    MembershipsResponse:
      type: object
      properties:
        memberships:
          type: array
          items:
            $ref: '#/components/schemas/Membership'
      required: [memberships]

    UpdateMembershipRequest:
      type: object
      properties:
        role:
          type: string
          enum: [owner, admin, member, viewer]
        status:
          type: string
          enum: [active, disabled]

    CreateOrganizationInviteRequest:
      type: object
      properties:
        email: { type: string }
        role:
          type: string
          enum: [admin, member, viewer]
      required: [email, role]

    OrganizationInviteResponse:
      type: object
      properties:
        invite:
          $ref: '#/components/schemas/OrganizationInvite'
      required: [invite]

    OrganizationInvitesResponse:
      type: object
      properties:
        invites:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationInvite'
      required: [invites]

    OrganizationInviteCreateResponse:
      type: object
      properties:
        invite:
          $ref: '#/components/schemas/OrganizationInvite'
        invite_url:
          type: string
          format: uri
      required: [invite, invite_url]

    CreateWorkspaceRequest:
      type: object
      properties:
        organization_id: { type: string }
        slug: { type: string }
        display_name: { type: string }
        region: { type: string }
        workspace_tier:
          type: string
          enum: [standard, plus, dedicated]
      required: [organization_id, slug, display_name, region, workspace_tier]

    WorkspaceResponse:
      type: object
      properties:
        workspace:
          $ref: '#/components/schemas/Workspace'
      required: [workspace]

    WorkspacesResponse:
      type: object
      properties:
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
      required: [workspaces]

    WorkspaceCreateResponse:
      type: object
      properties:
        workspace:
          $ref: '#/components/schemas/Workspace'
        provisioning_job:
          $ref: '#/components/schemas/ProvisioningJob'
      required: [workspace, provisioning_job]

    ProvisioningJobResponse:
      type: object
      properties:
        job:
          $ref: '#/components/schemas/ProvisioningJob'
      required: [job]

    CreateWorkspaceLaunchSessionRequest:
      type: object
      properties:
        return_path: { type: string }

    WorkspaceLaunchSessionResponse:
      type: object
      properties:
        launch_session:
          $ref: '#/components/schemas/WorkspaceLaunchSession'
      required: [launch_session]

    WorkspaceSessionExchangeRequest:
      type: object
      properties:
        exchange_token: { type: string }
      required: [exchange_token]

    WorkspaceSessionExchangeResponse:
      type: object
      properties:
        workspace:
          $ref: '#/components/schemas/Workspace'
        grant:
          $ref: '#/components/schemas/WorkspaceGrant'
      required: [workspace, grant]

    UsageSummaryResponse:
      type: object
      properties:
        summary:
          $ref: '#/components/schemas/UsageSummary'
      required: [summary]
