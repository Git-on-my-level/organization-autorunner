        '200':
          description: Stripe webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StripeWebhookReceiptResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /organizations/{organization_id}/workspace-inventory:
