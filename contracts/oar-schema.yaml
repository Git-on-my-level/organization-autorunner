# oar-schema.yaml
#
# Shared contract for OAR (Organization Autorunner).
# The canonical workspace model exposes topics, documents, boards, and cards as
# first-class resources. Threads remain backing infrastructure for evidence,
# sequencing, and timeline inspection.

version: "0.3.0"

enums:
  topic_type:
    enum_policy: strict
    values: [case, process, relationship, initiative, objective, decision, incident, risk, request, note, other]

  topic_status:
    enum_policy: strict
    values: [proposed, active, paused, blocked, resolved, closed, archived]

  thread_status:
    enum_policy: strict
    values: [active, archived]

  priority:
    enum_policy: strict
    values: [p0, p1, p2, p3]

  work_item_risk:
    enum_policy: strict
    values: [low, medium, high, critical]

  card_resolution:
    enum_policy: strict
    description: >
      Terminal resolution for a card. Null/absent while the card is active; only
      `done` or `canceled` when resolved.
    values: [done, canceled]

  review_outcome:
    enum_policy: strict
    values: [accept, revise, escalate]

  inbox_category:
    enum_policy: strict
    values: [decision_needed, intervention_needed, stale_topic, work_item_risk, document_attention]

  agent_notification_status:
    enum_policy: strict
    values: [unread, read, dismissed]

  board_status:
    enum_policy: strict
    values: [active, paused, closed]

  board_column_key:
    enum_policy: strict
    values: [backlog, ready, in_progress, blocked, review, done]

  event_type:
    enum_policy: open
    description: >
      Initial known values. The system MUST accept and store unknown values.
    values:
      - topic_created
      - topic_updated
      - topic_status_changed
      - topic_archived
      - topic_restored
      - topic_trashed
      - message_posted
      - receipt_added
      - review_completed
      - decision_needed
      - intervention_needed
      - decision_made
      - document_created
      - document_revised
      - document_revision_created
      - document_trashed
      - board_created
      - board_updated
      - board_card_added
      - board_card_moved
      - board_card_archived
      - board_card_trashed
      - card_created
      - card_updated
      - card_moved
      - card_archived
      - card_trashed
      - card_resolved
      - exception_raised
      - inbox_item_acknowledged
      - agent_notification_read
      - agent_notification_dismissed

  artifact_kind:
    enum_policy: open
    values: [receipt, review, doc, evidence, log]

  provenance_source:
    enum_policy: open
    description: Discrete evidence label. Never a numeric confidence score.
    examples:
      - "receipt:<artifact_id>"
      - "decision:<event_id>"
      - "actor_statement:<event_id>"
      - "inferred"

ref_format:
  description: >
    All strings in `refs`, `*_ref`, and `*_refs` fields MUST use typed prefixes
    so consumers can parse the target deterministically.
  prefixes:
    "artifact:<id>": "References an artifact by ID"
    "event:<id>": "References an event by ID"
    "thread:<id>": "References a backing thread by ID"
    "topic:<id>": "References a topic by ID"
    "document:<id>": "References a document lineage by ID"
    "document_revision:<id>": "References a document revision by ID"
    "board:<id>": "References a board by ID"
    "card:<id>": "References a card by ID"
    "inbox:<id>": "References a derived inbox item by ID"
    "url:<url>": "References an external URL"
  rules:
    - "All refs MUST start with a typed prefix followed by a colon and value."
    - "Consumers MUST parse the prefix; they MUST NOT infer ref kind from raw ids."
    - "Reverse lookups MUST be derived from typed refs and ref_edge records, not legacy foreign-key-only joins."
    - "Unknown prefixes MUST be preserved and round-tripped."

provenance:
  description: >
    Standardized provenance object used on mutable domain resources, events, and
    restricted fields so evidence-backed changes remain explainable.
  fields:
    sources:
      type: "list<string>"
      required: true
      description: Provenance source labels (see provenance_source enum)
    notes:
      type: string
      required: false
      description: Free-text explanation
    by_field:
      type: "map<string, list<string>>"
      required: false
      description: >
        Per-field provenance for restricted fields. Key is the field name and
        value is the list of provenance source labels supporting that field.

actor:
  description: >
    Actors are opaque IDs. OAR does not encode human versus agent distinctions
    in the durable schema.
  registry_fields:
    id: { type: string, required: true }
    display_name: { type: string, required: true }
    tags: { type: "list<string>", required: false }
    created_at: { type: datetime, required: true }

primitives:
  event:
    description: Append-only. Never edited or deleted. Corrections are new events.
    fields:
      id: { type: string, required: true }
      ts: { type: datetime, required: true }
      type: { type: string, required: true, ref: enums.event_type }
      actor_id: { type: string, required: true }
      thread_ref: { type: typed_ref, required: false, description: "Backing thread when the event is thread-scoped." }
      refs: { type: "list<typed_ref>", required: true }
      summary: { type: string, required: true }
      payload: { type: object, required: false }
      provenance: { type: object, required: true, ref: provenance }

  thread:
    description: >
      Backing workspace infrastructure record. Threads support event ordering,
      low-level inspection, and timeline reconstruction. They are not the
      primary planning surface.
    fields:
      id: { type: string, required: true }
      topic_ref: { type: typed_ref, required: false }
      title: { type: string, required: true }
      status: { type: string, required: true, ref: enums.thread_status }
      priority: { type: string, required: true, ref: enums.priority }
      tags: { type: "list<string>", required: true }
      latest_event_at: { type: datetime, required: false }
      created_at: { type: datetime, required: true }
      created_by: { type: string, required: true }
      updated_at: { type: datetime, required: true }
      updated_by: { type: string, required: true }
      provenance: { type: object, required: true, ref: provenance }
      archived_at: { type: datetime, required: false }
      archived_by: { type: string, required: false }
      trashed_at: { type: datetime, required: false }
      trashed_by: { type: string, required: false }
      trash_reason: { type: string, required: false }

  artifact:
    description: >
      Immutable blob. New versions are new artifacts linked through refs. Packet
      artifacts use structured validation; all other kinds remain opaque content.
    fields:
      id: { type: string, required: true }
      created_at: { type: datetime, required: true }
      created_by: { type: string, required: true }
      kind: { type: string, required: true, ref: enums.artifact_kind }
      content_type: { type: string, required: true }
      content_hash: { type: string, required: true }
      refs: { type: "list<typed_ref>", required: true }
      summary: { type: string, required: false }
      trashed_at: { type: datetime, required: false }
      trashed_by: { type: string, required: false }
      trash_reason: { type: string, required: false }

  ref_edge:
    description: >
      Normalized directional lookup edge derived from typed refs. Used for fast
      reverse traversal without reintroducing legacy resource-specific join keys.
    fields:
      source_ref: { type: typed_ref, required: true }
      target_ref: { type: typed_ref, required: true }
      relation: { type: string, required: true }
      discovered_at: { type: datetime, required: true }
      source_event_ref: { type: typed_ref, required: false }
      source_artifact_ref: { type: typed_ref, required: false }

resources:
  topic:
    description: >
      First-class durable work subject. Topics are the canonical place to track
      status, intent, and linked evidence for organizational work.
    fields:
      id: { type: string, required: true }
      type: { type: string, required: true, ref: enums.topic_type }
      status: { type: string, required: true, ref: enums.topic_status }
      title: { type: string, required: true }
      summary: { type: string, required: true }
      owner_refs: { type: "list<typed_ref>", required: true }
      thread_id: { type: string, required: false, description: "Backing thread id for topic timeline and events." }
      document_refs: { type: "list<typed_ref>", required: true }
      board_refs: { type: "list<typed_ref>", required: true }
      related_refs: { type: "list<typed_ref>", required: true }
      created_at: { type: datetime, required: true }
      created_by: { type: string, required: true }
      updated_at: { type: datetime, required: true }
      updated_by: { type: string, required: true }
      provenance: { type: object, required: true, ref: provenance }

  document:
    description: Canonical mutable document lineage anchored to a typed subject ref.
    fields:
      id: { type: string, required: true }
      title: { type: string, required: true }
      subject_ref: { type: typed_ref, required: true }
      head_revision_ref: { type: typed_ref, required: true }
      state: { type: string, required: true }
      refs: { type: "list<typed_ref>", required: true }
      created_at: { type: datetime, required: true }
      created_by: { type: string, required: true }
      updated_at: { type: datetime, required: true }
      updated_by: { type: string, required: true }
      provenance: { type: object, required: true, ref: provenance }

  document_revision:
    description: Immutable append-only revision in a document lineage.
    fields:
      revision_id: { type: string, required: true }
      document_ref: { type: typed_ref, required: true }
      prev_revision_ref: { type: typed_ref, required: false }
      artifact_ref: { type: typed_ref, required: true }
      revision_number: { type: integer, required: true }
      summary: { type: string, required: false }
      created_at: { type: datetime, required: true }
      created_by: { type: string, required: true }

  board:
    description: >
      Durable coordination surface over topics and cards. Boards own layout,
      column policy, and operator-facing grouping, while linked resources are
      represented through typed refs.
    fields:
      id: { type: string, required: true }
      title: { type: string, required: true }
      status: { type: string, required: true, ref: enums.board_status }
      primary_topic_ref: { type: typed_ref, required: false }
      thread_id: { type: string, required: false, description: "Backing thread id for board timeline and events." }
      document_refs: { type: "list<typed_ref>", required: true }
      card_refs: { type: "list<typed_ref>", required: true }
      pinned_refs: { type: "list<typed_ref>", required: true }
      created_at: { type: datetime, required: true }
      created_by: { type: string, required: true }
      updated_at: { type: datetime, required: true }
      updated_by: { type: string, required: true }
      provenance: { type: object, required: true, ref: provenance }

  card:
    description: >
      First-class board work item. Cards can point at a topic, a backing thread,
      and supporting documents, but card identity is not derived from those refs.
      On create, the server allocates a backing thread id; clients MUST NOT send
      thread_id or parent_thread on board-card writes. Use related_refs with a
      single thread ref when the card must associate with a collaboration thread.
      Persisted workspaces may still store parent_thread_id internally for
      historical board-row linkage; public HTTP card bodies (publicCardView) omit
      parent_thread and callers MUST NOT treat parent_thread as a writable field.
      Event audit payloads may include parent_thread for older lifecycle records until
      those events are regenerated.
    fields:
      id: { type: string, required: true }
      board_ref: { type: typed_ref, required: true }
      topic_ref: { type: typed_ref, required: false }
      thread_id: { type: string, required: true, description: "Backing thread id for the card; server-assigned when persisted." }
      document_ref: { type: typed_ref, required: false }
      title: { type: string, required: true }
      summary: { type: string, required: true }
      column_key: { type: string, required: true, ref: enums.board_column_key }
      rank: { type: string, required: true }
      assignee_refs: { type: "list<typed_ref>", required: true }
      due_at: { type: datetime, required: false, description: "Optional due instant for the work item." }
      definition_of_done: { type: "list<string>", required: false, description: "Acceptance lines for completing the card." }
      risk: { type: string, required: true, ref: enums.work_item_risk }
      resolution: { type: string, required: false, ref: enums.card_resolution, description: "Null while active; `done` or `canceled` when terminal." }
      resolution_refs: { type: "list<typed_ref>", required: true }
      related_refs: { type: "list<typed_ref>", required: true }
      created_at: { type: datetime, required: true }
      created_by: { type: string, required: true }
      updated_at: { type: datetime, required: true }
      updated_by: { type: string, required: true }
      provenance: { type: object, required: true, ref: provenance }

packets:
  _id_rule: >
    Packet content ID fields MUST equal the enclosing artifact id. OAR core
    MUST reject mismatches on write.

  receipt:
    stored_as: artifact
    kind: receipt
    fields:
      receipt_id: { type: string, required: true }
      subject_ref: { type: typed_ref, required: true, description: "MUST be card:<card_id>." }
      outputs: { type: "list<typed_ref>", required: true }
      verification_evidence: { type: "list<typed_ref>", required: true }
      changes_summary: { type: string, required: true }
      known_gaps: { type: "list<string>", required: true }

  review:
    stored_as: artifact
    kind: review
    fields:
      review_id: { type: string, required: true }
      subject_ref: { type: typed_ref, required: true, description: "MUST be card:<card_id>." }
      receipt_ref: { type: typed_ref, required: true }
      outcome: { type: string, required: true, ref: enums.review_outcome }
      notes: { type: string, required: true }
      evidence_refs: { type: "list<typed_ref>", required: true }

reference_conventions:
  description: Required refs per event and packet kind.

  event_refs:
    _rule: "Thread-scoped events SHOULD set thread_ref on the event payload."

    topic_created:
      refs_must_include: ["topic:<topic_id>"]

    topic_updated:
      refs_must_include: ["topic:<topic_id>"]

    topic_status_changed:
      refs_must_include: ["topic:<topic_id>"]
      payload_must_include: ["from_status", "to_status"]

    message_posted:
      thread_id: "required as thread_ref when the message belongs to a backing thread"

    receipt_added:
      refs_must_include: ["artifact:<receipt_artifact_id>", "card:<card_id>"]
      payload_must_include: ["subject_ref"]

    review_completed:
      refs_must_include: ["artifact:<review_artifact_id>", "artifact:<receipt_artifact_id>", "card:<card_id>"]
      payload_must_include: ["subject_ref"]

    document_created:
      refs_must_include: ["document:<document_id>", "document_revision:<revision_id>", "artifact:<artifact_id>"]

    document_revised:
      refs_must_include: ["document:<document_id>", "document_revision:<revision_id>", "artifact:<artifact_id>"]

    document_trashed:
      refs_must_include: ["document:<document_id>"]

    board_created:
      refs_must_include: ["board:<board_id>"]

    board_updated:
      refs_must_include: ["board:<board_id>"]

    board_card_added:
      refs_must_include: ["board:<board_id>", "card:<card_id>"]

    board_card_moved:
      refs_must_include: ["board:<board_id>", "card:<card_id>"]
      payload_must_include: ["column_key"]

    board_card_archived:
      refs_must_include: ["board:<board_id>", "card:<card_id>"]

    card_created:
      refs_must_include: ["card:<card_id>", "board:<board_id>"]

    card_updated:
      refs_must_include: ["card:<card_id>", "board:<board_id>"]

    card_moved:
      refs_must_include: ["card:<card_id>", "board:<board_id>"]
      payload_must_include: ["column_key"]

    card_archived:
      refs_must_include: ["card:<card_id>", "board:<board_id>"]

    card_resolved:
      refs_must_include: ["card:<card_id>", "board:<board_id>"]
      payload_must_include: ["resolution"]

    decision_needed:
      refs_must_include: ["topic:<topic_id>"]

    intervention_needed:
      refs_must_include: ["topic:<topic_id>"]

    decision_made:
      refs_must_include: ["topic:<topic_id>"]

    exception_raised:
      payload_must_include: ["subtype"]

    inbox_item_acknowledged:
      refs_must_include: ["inbox:<inbox_item_id>"]

    agent_notification_read:
      refs_must_include: ["artifact:<wakeup_id>"]

    agent_notification_dismissed:
      refs_must_include: ["artifact:<wakeup_id>"]

  artifact_refs:
    _rule: "Packet artifacts MUST include subject_ref and supporting refs in artifact.refs."
    receipt: { refs_must_include: ["artifact:<artifact_id>", "card:<card_id>"] }
    review: { refs_must_include: ["artifact:<artifact_id>", "artifact:<receipt_artifact_id>", "card:<card_id>"] }

derived:
  board_summary:
    fields:
      card_count: { type: integer, required: true }
      cards_by_column: { type: object, required: true }
      unresolved_card_count: { type: integer, required: true }
      resolved_card_count: { type: integer, required: true }
      document_count: { type: integer, required: true }
      latest_activity_at: { type: datetime, required: false }

  board_card_summary:
    fields:
      related_topic_count: { type: integer, required: true }
      document_count: { type: integer, required: true }
      inbox_count: { type: integer, required: true }
      latest_activity_at: { type: datetime, required: false }
      stale: { type: boolean, required: true }

  projection_freshness:
    description: Derived freshness metadata for projection-backed scan surfaces.

  inbox_item:
    description: >
      Regenerable operator work queue item derived from events, resource state,
      and typed refs.
    fields:
      id: { type: string, required: true }
      category: { type: string, required: true, ref: enums.inbox_category }
      subject_ref: { type: typed_ref, required: true }
      source_event_ref: { type: typed_ref, required: false }
      title: { type: string, required: true }
      recommended_action: { type: string, required: true }
      related_refs: { type: "list<typed_ref>", required: true }

  agent_notification:
    fields:
      wakeup_id: { type: string, required: true }
      status: { type: string, required: true, ref: enums.agent_notification_status }
      target_handle: { type: string, required: true }
      target_actor_id: { type: string, required: true }
      thread_ref: { type: typed_ref, required: false }
      trigger_event_ref: { type: typed_ref, required: true }
      created_at: { type: datetime, required: true }
      read_at: { type: datetime, required: false }
      dismissed_at: { type: datetime, required: false }

lifecycle_rules:
  mutation_model:
    - "Events and artifacts are append-only."
    - "Topics, documents, boards, and cards are mutable resources with explicit provenance."
    - "Document revisions are immutable append-only records."

  concurrency_tokens:
    - "topic.updated_at"
    - "document.updated_at"
    - "board.updated_at"
    - "card.updated_at"

  ref_lookup_rules:
    - "Reverse navigation MUST be reconstructible from typed refs and ref_edge rows."
    - "Cards resolve related evidence through resolution_refs and related_refs, not legacy resource-specific join fields."

grounding_rules:
  restricted_fields:
    description: Evidence-backed mutations require explicit provenance and refs.
    fields:
      - "card.resolution -> done"
      - "card.resolution -> canceled"
      - "topic.status -> resolved"
      - "any shipped/sent/deployed assertion"

  interpretive_fields:
    description: May change without receipts when clearly marked as interpretive.
    fields:
      - "topic.summary"
      - "card.summary"

staleness:
  rule: >
    A topic is stale when no linked thread, document, or card activity has been
    observed inside its expected operating window.
  on_stale:
    - "Emit exception_raised with subtype stale_topic"
    - "Surface a derived inbox item in category stale_topic"
