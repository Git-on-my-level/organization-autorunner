      x-oar-cli-path: "inbox list"
      x-oar-why: "Surface derived actionable risk and decision signals."
      x-oar-examples:
        - title: List inbox
          command: oar inbox list --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ items, generated_at }`."
      x-oar-error-codes: []
      x-oar-concepts: [inbox, derived-views]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Derived inbox view; do not build durable automation directly on projection payload shapes. Prefer canonical events and threads for durable substrate. Safe and idempotent."
      parameters:
        - in: query
          name: risk_horizon_days
          schema: { type: integer }
      responses:
        '200':
          description: Inbox items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxResponse'

  /inbox/{inbox_item_id}:
    get:
      operationId: getInboxItem
      summary: Get derived inbox item detail
      tags: [inbox]
      x-oar-surface: "projection"
      x-oar-command-id: "inbox.get"
      x-oar-cli-path: "inbox get"
      x-oar-why: "Inspect one inbox item in detail before acting on it."
      x-oar-examples:
        - title: Get inbox item by canonical id
          command: oar inbox get --id inbox:decision_needed:thread_123:none:event_123 --json
        - title: Get inbox item by alias
          command: oar inbox get --id ibx_abcd1234ef56 --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ item, generated_at }` for the requested inbox item."
      x-oar-error-codes: [not_found]
      x-oar-concepts: [inbox, derived-views]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Derived inbox view; do not build durable automation directly on projection payload shapes. Prefer canonical events and threads for durable substrate. CLI supports canonical ids, aliases, and unique prefixes."
      parameters:
        - in: path
          name: inbox_item_id
          required: true
          schema: { type: string }
        - in: query
          name: risk_horizon_days
          schema: { type: integer }
      responses:
        '200':
          description: Inbox item detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxItemResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /inbox/stream:
    get:
      operationId: streamInbox
      summary: Stream derived inbox items via SSE
      tags: [inbox]
      x-oar-surface: "projection"
      x-oar-command-id: "inbox.stream"
      x-oar-cli-path: "inbox stream"
      x-oar-why: "Follow live derived inbox updates without repeated polling."
      x-oar-examples:
        - title: Stream inbox updates
          command: oar inbox stream --json
        - title: Resume inbox stream
          command: oar inbox stream --last-event-id <id> --json
      x-oar-input-mode: "none"
      x-oar-streaming:
        mode: sse
        event_type: inbox_item
        resumable: true
      x-oar-output-envelope: "SSE stream where each event carries `{ item }` derived inbox metadata."
      x-oar-error-codes: [internal_error, cli_outdated]
      x-oar-concepts: [inbox, derived-views, streaming]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Derived inbox view; do not build durable automation directly on projection payload shapes. Prefer canonical events and threads for durable substrate. Supports `Last-Event-ID` header or `last_event_id` query for resumable reads."
      parameters:
        - in: query
          name: risk_horizon_days
          schema: { type: integer }
        - in: query
          name: last_event_id
          schema: { type: string }
        - in: header
          name: Last-Event-ID
          schema: { type: string }
      responses:
        '200':
          description: Inbox stream
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '426':
          $ref: '#/components/responses/CLIOutdatedResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /inbox/ack:
    post:
      operationId: ackInboxItem
      summary: Acknowledge an inbox item
      tags: [inbox]
      x-oar-surface: "projection"
      x-oar-command-id: "inbox.ack"
      x-oar-cli-path: "inbox ack"
      x-oar-why: "Suppress already-acted-on derived inbox signals."
      x-oar-examples:
        - title: Ack inbox item
          command: oar inbox ack --thread-id thread_123 --inbox-item-id inbox:item-1 --json
        - title: Ack inbox item by id
          command: oar inbox ack inbox:decision_needed:thread_123:none:event_1 --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ event }` representing acknowledgment."
      x-oar-error-codes: [invalid_json, invalid_request, unknown_actor_id]
      x-oar-concepts: [inbox, events]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Derived inbox view; do not build durable automation directly on projection payload shapes. Prefer canonical events and threads for durable substrate. Idempotent at semantic level; repeated acks should not duplicate active inbox items."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AckInboxRequest'
      responses:
        '201':
          description: Ack event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /derived/rebuild:
    post:
      operationId: rebuildDerivedViews
      summary: Rebuild derived views
      tags: [derived]
      x-oar-surface: "utility"
      x-oar-command-id: "derived.rebuild"
      x-oar-cli-path: "derived rebuild"
      x-oar-why: "Force deterministic recomputation of derived views after maintenance or migration."
      x-oar-examples:
        - title: Rebuild derived
          command: oar derived rebuild --actor-id system --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ ok: true }`."
      x-oar-error-codes: [invalid_json, invalid_request, unknown_actor_id]
      x-oar-concepts: [derived-views, maintenance]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Mutating admin command; serialize with other writes."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorOnlyRequest'
      responses:
        '200':
          description: Rebuild complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OKResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

components:
  parameters:
    ThreadID:
      in: path
      name: thread_id
      required: true
      schema: { type: string }
    BoardID:
      in: path
      name: board_id
      required: true
      schema: { type: string }
    SnapshotID:
      in: path
      name: snapshot_id
      required: true
      schema: { type: string }
    CommitmentID:
      in: path
      name: commitment_id
      required: true
      schema: { type: string }
    EventID:
      in: path
      name: event_id
      required: true
      schema: { type: string }
    ArtifactID:
      in: path
      name: artifact_id
      required: true
      schema: { type: string }
    DocumentID:
      in: path
      name: document_id
      required: true
      schema: { type: string }
    RevisionID:
      in: path
      name: revision_id
      required: true
      schema: { type: string }
    CommandID:
      in: path
      name: command_id
      required: true
      schema: { type: string }
    ConceptName:
      in: path
      name: concept_name
      required: true
      schema: { type: string }

  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    CLIOutdatedResponse:
      description: CLI version is below minimum compatibility version
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CLIOutdatedErrorEnvelope'

  schemas:
    AnyObject:
      type: object
      additionalProperties: true

    HealthResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    ProjectionMaintenanceErrorSnapshot:
      type: object
      properties:
        at: { type: string }
        message: { type: string }
        operation: { type: string }
      required: [at, message, operation]

    ProjectionMaintenanceSnapshot:
      type: object
      properties:
        pending_dirty_count: { type: integer }
        oldest_dirty_at: { type: string }
        oldest_dirty_lag_seconds: { type: integer }
        last_successful_stale_scan_at: { type: string }
        last_error:
          $ref: '#/components/schemas/ProjectionMaintenanceErrorSnapshot'
      required: [pending_dirty_count]

    OpsHealthResponse:
      type: object
      properties:
        ok: { type: boolean }
        projection_maintenance:
          $ref: '#/components/schemas/ProjectionMaintenanceSnapshot'
      required: [ok]

    VersionResponse:
      type: object
      properties:
        schema_version: { type: string }
        command_registry_digest: { type: string }
      required: [schema_version, command_registry_digest]

    HandshakeResponse:
      type: object
      properties:
        core_version: { type: string }
        api_version: { type: string }
        schema_version: { type: string }
        command_registry_digest: { type: string }
        min_cli_version: { type: string }
        recommended_cli_version: { type: string }
        cli_download_url: { type: string }
        core_instance_id: { type: string }
        dev_actor_mode:
          type: boolean
          description: Whether legacy dev actor mode is enabled for unauthenticated actor creation and selection flows.
      required:
        - core_version
        - api_version
        - schema_version
        - command_registry_digest
        - min_cli_version
        - recommended_cli_version
        - cli_download_url
        - core_instance_id

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            recoverable: { type: boolean }
            hint: { type: string }
          required: [code, message, recoverable, hint]
      required: [error]

    CLIOutdatedErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [cli_outdated]
            message:
              type: string
            recoverable: { type: boolean }
            hint: { type: string }
          required: [code, message, recoverable, hint]
        upgrade:
          type: object
          properties:
            min_cli_version: { type: string }
            recommended_cli_version: { type: string }
            cli_download_url: { type: string }
          required: [min_cli_version, recommended_cli_version, cli_download_url]
      required: [error, upgrade]

    MetaCommandMetadata:
      type: object
      additionalProperties: true

    MetaCommandsResponse:
      type: object
      properties:
        openapi_version: { type: string }
        contract_version: { type: string }
        generated_by: { type: string }
        extension_prefix: { type: string }
        command_count: { type: integer }
        commands:
          type: array
          items:
            $ref: '#/components/schemas/MetaCommandMetadata'
      required: [openapi_version, contract_version, generated_by, extension_prefix, command_count, commands]

    MetaCommandResponse:
      type: object
      properties:
        command:
          $ref: '#/components/schemas/MetaCommandMetadata'
      required: [command]

    MetaConceptSummary:
      type: object
      properties:
        name: { type: string }
        command_count: { type: integer }
        command_ids:
          type: array
          items: { type: string }
      required: [name, command_count, command_ids]

    MetaConceptsResponse:
      type: object
      properties:
        concepts:
          type: array
          items:
            $ref: '#/components/schemas/MetaConceptSummary'
      required: [concepts]

    MetaConceptDetail:
      type: object
      properties:
        name: { type: string }
        command_count: { type: integer }
        command_ids:
          type: array
          items: { type: string }
        commands:
          type: array
          items:
            $ref: '#/components/schemas/MetaCommandMetadata'
      required: [name, command_count, command_ids, commands]

    MetaConceptResponse:
      type: object
      properties:
        concept:
          $ref: '#/components/schemas/MetaConceptDetail'
      required: [concept]

    Actor:
      type: object
      additionalProperties: true

    Event:
      type: object
      additionalProperties: true

    Snapshot:
      type: object
      additionalProperties: true

    Thread:
      type: object
      additionalProperties: true

    Commitment:
      type: object
      additionalProperties: true

    Artifact:
      type: object
      additionalProperties: true

    Document:
      type: object
      description: Canonical long-lived document lineage with a mutable head revision and immutable history.
      additionalProperties: true

    DocumentRevision:
      type: object
      description: Immutable revision entry within a document lineage.
      additionalProperties: true

    InboxItem:
      type: object
      additionalProperties: true

    RegisterActorRequest:
      type: object
      properties:
        actor:
          $ref: '#/components/schemas/AnyObject'
      required: [actor]

    ActorResponse:
      type: object
      properties:
        actor:
          $ref: '#/components/schemas/Actor'
      required: [actor]

    ActorsResponse:
      type: object
      properties:
        actors:
          type: array
          items:
            $ref: '#/components/schemas/Actor'
        next_cursor:
          type: string
          description: "Opaque pagination cursor for fetching the next page of results. Omitted when there are no more results."
      required: [actors]

    Agent:
      type: object
      properties:
        agent_id: { type: string }
        username: { type: string }
        actor_id: { type: string }
        revoked: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [agent_id, username, actor_id, revoked, created_at, updated_at]

    AgentKey:
      type: object
      properties:
        key_id: { type: string }
        agent_id: { type: string }
        algorithm: { type: string }
        public_key: { type: string }
        created_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
      required: [key_id, agent_id, algorithm, public_key, created_at]

    TokenBundle:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string }
        expires_in: { type: integer, format: int64 }
      required: [access_token, refresh_token, token_type, expires_in]

    BootstrapStatusResponse:
      type: object
      properties:
        bootstrap_registration_available: { type: boolean }
      required: [bootstrap_registration_available]

    Invite:
      type: object
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [human, agent, any]
        created_by_agent_id: { type: string }
        created_by_actor_id: { type: string }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        consumed_at: { type: string, format: date-time }
        consumed_by_agent_id: { type: string }
        consumed_by_actor_id: { type: string }
        revoked_at: { type: string, format: date-time }
        revoked_by_agent_id: { type: string }
        revoked_by_actor_id: { type: string }
      required: [id, kind, created_by_agent_id, created_by_actor_id, created_at]

    AuthPrincipalSummary:
      type: object
      properties:
        agent_id: { type: string }
        actor_id: { type: string }
        username: { type: string }
        principal_kind:
          type: string
          enum: [human, agent]
        auth_method:
          type: string
          enum: [passkey, public_key]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        revoked: { type: boolean }
        revoked_at: { type: string, format: date-time }
      required: [agent_id, actor_id, username, principal_kind, auth_method, created_at, updated_at, revoked]

    AuthPrincipalsResponse:
      type: object
      properties:
        principals:
          type: array
          items:
            $ref: '#/components/schemas/AuthPrincipalSummary'
        active_human_principal_count:
          type: integer
          description: "Number of active human principals in the workspace."
        next_cursor:
          type: string
          description: "Opaque pagination cursor for fetching the next page of results. Omitted when there are no more results."
      required: [principals, active_human_principal_count]

    RevokePrincipalRequest:
      type: object
      properties:
        allow_human_lockout:
          type: boolean
          description: "Break-glass override that allows revoking the final active human principal in the workspace."
        human_lockout_reason:
          type: string
          minLength: 1
          description: "Required when allow_human_lockout is true. Explain why the last active human principal must be revoked."

    PrincipalRevocationSummary:
      type: object
      properties:
        mode:
          type: string
          enum: [self, admin]
        already_revoked:
          type: boolean
        allow_human_lockout:
          type: boolean
          description: "Whether the last-active-human safeguard was explicitly bypassed for this successful revoke."
      required: [mode, already_revoked, allow_human_lockout]

    RevokePrincipalResponse:
      type: object
      properties:
        ok: { type: boolean }
        principal:
          $ref: '#/components/schemas/AuthPrincipalSummary'
        revocation:
          $ref: '#/components/schemas/PrincipalRevocationSummary'
      required: [ok, principal, revocation]

    AuthAuditEvent:
      type: object
      properties:
        event_id: { type: string }
        event_type:
          type: string
          enum:
            - bootstrap_consumed
            - invite_created
            - invite_revoked
            - invite_consumed
            - principal_registered
            - principal_human_lockout_revoked
            - principal_revoked
            - principal_self_revoked
        occurred_at: { type: string, format: date-time }
        actor_agent_id: { type: string }
        actor_actor_id: { type: string }
        subject_agent_id: { type: string }
        subject_actor_id: { type: string }
        invite_id: { type: string }
        metadata:
          $ref: '#/components/schemas/AnyObject'
      required: [event_id, event_type, occurred_at, metadata]

    AuthAuditResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/AuthAuditEvent'
        next_cursor:
          type: string
          description: "Opaque pagination cursor for fetching the next page of results. Omitted when there are no more results."
      required: [events]

    RegisterAgentRequest:
      type: object
      properties:
        username: { type: string }
        public_key: { type: string }
        bootstrap_token: { type: string }
        invite_token: { type: string }
      required: [username, public_key]

    RegisterAgentResponse:
      type: object
      properties:
        agent:
          $ref: '#/components/schemas/Agent'
        key:
          $ref: '#/components/schemas/AgentKey'
        tokens:
          $ref: '#/components/schemas/TokenBundle'
      required: [agent, key, tokens]

    AuthTokenRequest:
      type: object
      properties:
        grant_type: { type: string }
        refresh_token: { type: string }
        agent_id: { type: string }
        key_id: { type: string }
        signed_at: { type: string, format: date-time }
        signature: { type: string }
      required: [grant_type]

    AuthTokenResponse:
      type: object
      properties:
        tokens:
          $ref: '#/components/schemas/TokenBundle'
      required: [tokens]

    PasskeyRegisterOptionsRequest:
      type: object
      properties:
        display_name: { type: string }
        bootstrap_token: { type: string }
        invite_token: { type: string }
      required: [display_name]

    PasskeyLoginOptionsRequest:
      type: object
      properties:
        username: { type: string }

    PasskeyVerifyRequest:
      type: object
      properties:
        session_id: { type: string }
        bootstrap_token: { type: string }
        invite_token: { type: string }
        credential:
          $ref: '#/components/schemas/AnyObject'
      required: [session_id, credential]

    PasskeyOptionsResponse:
      type: object
      properties:
        session_id: { type: string }
        options:
          $ref: '#/components/schemas/AnyObject'
      required: [session_id, options]

    PasskeyAuthResponse:
      type: object
      properties:
        agent:
          $ref: '#/components/schemas/Agent'
        tokens:
          $ref: '#/components/schemas/TokenBundle'
      required: [agent, tokens]

    CreateInviteRequest:
      type: object
      properties:
        kind:
          type: string
          enum: [human, agent, any]
        expires_at: { type: string, format: date-time }
      required: [kind]

    CreateInviteResponse:
      type: object
      properties:
        invite:
          $ref: '#/components/schemas/Invite'
        token: { type: string }
      required: [invite, token]

    ListInvitesResponse:
      type: object
      properties:
        invites:
          type: array
          items:
            $ref: '#/components/schemas/Invite'
      required: [invites]

    RevokeInviteResponse:
      type: object
      properties:
        invite:
          $ref: '#/components/schemas/Invite'
      required: [invite]

    CurrentAgentResponse:
      type: object
      properties:
        agent:
          $ref: '#/components/schemas/Agent'
        keys:
          type: array
          items:
            $ref: '#/components/schemas/AgentKey'
      required: [agent, keys]

    PatchCurrentAgentRequest:
      type: object
      properties:
        username: { type: string }
      required: [username]

    CurrentAgentPatchResponse:
      type: object
      properties:
        agent:
          $ref: '#/components/schemas/Agent'
      required: [agent]

    RotateKeyRequest:
      type: object
      properties:
        public_key: { type: string }
      required: [public_key]

    RotateKeyResponse:
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentKey'
      required: [key]

    ActorOnlyRequest:
      type: object
      properties:
        actor_id: { type: string }

    CreateThreadRequest:
      type: object
      properties:
        actor_id: { type: string }
        request_key: { type: string }
        thread:
          $ref: '#/components/schemas/AnyObject'
      required: [thread]

    PatchThreadRequest:
      type: object
      properties:
        actor_id: { type: string }
        patch:
          $ref: '#/components/schemas/AnyObject'
        if_updated_at:
          type: string
          format: date-time
      required: [patch]

    ThreadResponse:
      type: object
      properties:
        thread:
          $ref: '#/components/schemas/Thread'
      required: [thread]

    ThreadsResponse:
      type: object
      properties:
        threads:
          type: array
          items:
            $ref: '#/components/schemas/Thread'
        next_cursor:
          type: string
          description: "Opaque pagination cursor for fetching the next page of results. Omitted when there are no more results."
      required: [threads]

    ThreadTimelineResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        snapshots:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Snapshot'
        artifacts:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Artifact'
      required: [events, snapshots, artifacts]

    ThreadContextArtifact:
      type: object
      properties:
        ref: { type: string }
        artifact:
          $ref: '#/components/schemas/Artifact'
        content_preview: { type: string }
      required: [ref, artifact]

    ThreadContextResponse:
      type: object
      properties:
        thread:
          $ref: '#/components/schemas/Thread'
        recent_events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        key_artifacts:
          type: array
          items:
            $ref: '#/components/schemas/ThreadContextArtifact'
        open_commitments:
          type: array
          items:
            $ref: '#/components/schemas/Commitment'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/Document'
      required: [thread, recent_events, key_artifacts, open_commitments, documents]

    ThreadWorkspaceEventSection:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        count:
          type: integer
      required: [items, count]

    ThreadWorkspaceInboxSection:
      type: object
