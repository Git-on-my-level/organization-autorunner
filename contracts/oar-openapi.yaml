        subject_ref: { $ref: '#/components/schemas/TypedRef' }
        objective: { type: string }
        constraints:
          type: array
          items: { type: string }
        context_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        acceptance_criteria:
          type: array
          items: { type: string }
        definition_of_done:
          type: array
          items: { type: string }
      required:
        [work_order_id, subject_ref, objective, constraints, context_refs, acceptance_criteria, definition_of_done]

    ReceiptPacket:
      type: object
      properties:
        receipt_id: { type: string }
        subject_ref: { $ref: '#/components/schemas/TypedRef' }
        work_order_ref: { $ref: '#/components/schemas/TypedRef' }
        outputs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        verification_evidence:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        changes_summary: { type: string }
        known_gaps:
          type: array
          items: { type: string }
      required:
        [receipt_id, subject_ref, work_order_ref, outputs, verification_evidence, changes_summary, known_gaps]

    ReviewPacket:
      type: object
      properties:
        review_id: { type: string }
        subject_ref: { $ref: '#/components/schemas/TypedRef' }
        work_order_ref: { $ref: '#/components/schemas/TypedRef' }
        receipt_ref: { $ref: '#/components/schemas/TypedRef' }
        outcome:
          type: string
          enum: [accept, revise, escalate]
        notes: { type: string }
        evidence_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
      required: [review_id, subject_ref, work_order_ref, receipt_ref, outcome, notes, evidence_refs]

    EventCreateInput:
      type: object
      properties:
        type: { type: string }
        actor_id: { type: string }
        thread_ref: { $ref: '#/components/schemas/TypedRef' }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        summary: { type: string }
        payload:
          type: object
          additionalProperties: true
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [type, actor_id, refs, summary, provenance]

    CreateTopicRequest:
      type: object
      properties:
        topic: { $ref: '#/components/schemas/TopicWriteInput' }
      required: [topic]

    PatchTopicRequest:
      type: object
      properties:
        patch: { $ref: '#/components/schemas/TopicPatchInput' }
        if_updated_at:
          type: string
          format: date-time
      required: [patch]

    CreateDocumentRequest:
      type: object
      properties:
        document: { $ref: '#/components/schemas/DocumentCreateInput' }
      required: [document]

    CreateDocumentRevisionRequest:
      type: object
      properties:
        revision: { $ref: '#/components/schemas/DocumentRevisionCreateInput' }
        if_document_updated_at:
          type: string
          format: date-time
        if_base_revision:
          type: string
          description: >
            Optional base revision id for optimistic concurrency (must match the document head
            when appending from the current tip). When omitted with the nested `revision` envelope,
            the server defaults to the document head revision.
      required: [revision]

    CreateBoardRequest:
      type: object
      properties:
        board: { $ref: '#/components/schemas/BoardCreateInput' }
      required: [board]

    PatchBoardRequest:
      type: object
      properties:
        patch: { $ref: '#/components/schemas/BoardPatchInput' }
        if_updated_at:
          type: string
          format: date-time
      required: [patch]

    CreateCardRequest:
      type: object
      properties:
        card: { $ref: '#/components/schemas/CardCreateInput' }
        if_board_updated_at:
          type: string
          format: date-time
      required: [card]

    PatchCardRequest:
      type: object
      properties:
        patch: { $ref: '#/components/schemas/CardPatchInput' }
        if_updated_at:
          type: string
          format: date-time
      required: [patch]

    MoveCardRequest:
      type: object
      properties:
        move: { $ref: '#/components/schemas/MoveCardInput' }
