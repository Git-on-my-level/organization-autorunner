openapi: 3.1.0
info:
  title: Organization Autorunner HTTP API
  version: 0.2.2
  description: |
    Canonical HTTP contract for organization-autorunner.

    This OpenAPI contract is the monorepo source of truth for generated clients,
    CLI command registry metadata, and command docs.
servers:
  - url: http://127.0.0.1:8000
x-oar-extension-vocabulary:
  x-oar-command-id: "Stable command identifier (for example: threads.list)"
  x-oar-cli-path: "CLI path segments (for example: threads list)"
  x-oar-why: "Why the command exists and when an agent should use it"
  x-oar-examples: "Deterministic examples for humans and agents"
  x-oar-input-mode: "none | json-body | raw-stream | file-and-body"
  x-oar-streaming: "Streaming characteristics for this operation"
  x-oar-output-envelope: "Output shape and stability notes"
  x-oar-error-codes: "Stable semantic error codes surfaced by core"
  x-oar-concepts: "Concept tags for docs/help grouping"
  x-oar-stability: "experimental | beta | stable"
  x-oar-agent-notes: "Idempotency, retries, and protocol caveats"
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [meta]
      x-oar-command-id: "meta.health"
      x-oar-cli-path: "meta health"
      x-oar-why: "Probe whether core storage is available before issuing stateful commands."
      x-oar-examples:
        - title: Health check
          command: oar meta health --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ ok: true }` when the service and storage are healthy."
      x-oar-error-codes: [storage_unavailable]
      x-oar-concepts: [health, readiness]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Safe and idempotent; retry with backoff on transport failures."
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /version:
    get:
      operationId: getVersion
      summary: Get schema contract version
      tags: [meta]
      x-oar-command-id: "meta.version"
      x-oar-cli-path: "meta version"
      x-oar-why: "Verify compatibility between core and generated clients before performing writes."
      x-oar-examples:
        - title: Read version
          command: oar meta version --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ schema_version }` only."
      x-oar-error-codes: []
      x-oar-concepts: [compatibility, schema]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Safe and idempotent."
      responses:
        '200':
          description: Version payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'

  /meta/handshake:
    get:
      operationId: getMetaHandshake
      summary: Get compatibility handshake metadata
      tags: [meta]
      x-oar-command-id: "meta.handshake"
      x-oar-cli-path: "meta handshake"
      x-oar-why: "Discover compatibility, upgrade, and instance identity metadata before command execution."
      x-oar-examples:
        - title: Read handshake metadata
          command: oar meta handshake --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns compatibility fields including minimum supported CLI version."
      x-oar-error-codes: []
      x-oar-concepts: [compatibility, handshake]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent. Use this endpoint to proactively gate incompatible CLI versions."
      responses:
        '200':
          description: Compatibility handshake
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandshakeResponse'

  /meta/commands:
    get:
      operationId: listMetaCommands
      summary: List generated command metadata
      tags: [meta]
      x-oar-command-id: "meta.commands.list"
      x-oar-cli-path: "meta commands list"
      x-oar-why: "Load generated command metadata used for help, docs, and agent introspection."
      x-oar-examples:
        - title: List command metadata
          command: oar meta commands list --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns generated command registry metadata from the canonical contract."
      x-oar-error-codes: [meta_unavailable, cli_outdated]
      x-oar-concepts: [meta, introspection]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent. Response shape matches committed generated artifacts."
      responses:
        '200':
          description: Command metadata registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaCommandsResponse'
        '426':
          $ref: '#/components/responses/CLIOutdatedResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /meta/commands/{command_id}:
    get:
      operationId: getMetaCommand
      summary: Get generated metadata for a command id
      tags: [meta]
      x-oar-command-id: "meta.commands.get"
      x-oar-cli-path: "meta commands get"
      x-oar-why: "Resolve a stable command id to full generated metadata and guidance."
      x-oar-examples:
        - title: Read command metadata
          command: oar meta commands get --command-id threads.list --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ command }` metadata for the requested command id."
      x-oar-error-codes: [not_found, meta_unavailable, cli_outdated]
      x-oar-concepts: [meta, introspection]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      parameters:
        - $ref: '#/components/parameters/CommandID'
      responses:
        '200':
          description: Command metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaCommandResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '426':
          $ref: '#/components/responses/CLIOutdatedResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /meta/concepts:
    get:
      operationId: listMetaConcepts
      summary: List generated concept metadata
      tags: [meta]
      x-oar-command-id: "meta.concepts.list"
      x-oar-cli-path: "meta concepts list"
      x-oar-why: "Discover conceptual groupings of commands generated from contract metadata."
      x-oar-examples:
        - title: List concepts
          command: oar meta concepts list --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ concepts }` summary metadata for all known concepts."
      x-oar-error-codes: [meta_unavailable, cli_outdated]
      x-oar-concepts: [meta, concepts]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      responses:
        '200':
          description: Concept metadata summary list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaConceptsResponse'
        '426':
          $ref: '#/components/responses/CLIOutdatedResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /meta/concepts/{concept_name}:
    get:
      operationId: getMetaConcept
      summary: Get generated metadata for one concept
      tags: [meta]
      x-oar-command-id: "meta.concepts.get"
      x-oar-cli-path: "meta concepts get"
      x-oar-why: "Resolve one concept tag to the commands that implement that concept."
      x-oar-examples:
        - title: Read one concept
          command: oar meta concepts get --concept-name compatibility --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ concept }` including matched command ids and command metadata."
      x-oar-error-codes: [not_found, meta_unavailable, cli_outdated]
      x-oar-concepts: [meta, concepts]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      parameters:
        - $ref: '#/components/parameters/ConceptName'
      responses:
        '200':
          description: Concept metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaConceptResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '426':
          $ref: '#/components/responses/CLIOutdatedResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /actors:
    post:
      operationId: registerActor
      summary: Register actor identity metadata
      tags: [actors]
      x-oar-command-id: "actors.register"
      x-oar-cli-path: "actors register"
      x-oar-why: "Bootstrap an authenticated caller identity before mutating thread state."
      x-oar-examples:
        - title: Register actor
          command: oar actors register --id bot-1 --display-name "Bot 1" --created-at 2026-03-04T10:00:00Z --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ actor }` with canonicalized stored values."
      x-oar-error-codes: [invalid_json, invalid_request, actor_exists]
      x-oar-concepts: [identity]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Not idempotent by default; repeated creates with same id return conflict."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterActorRequest'
      responses:
        '201':
          description: Actor created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActorResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
    get:
      operationId: listActors
      summary: List actors
      tags: [actors]
      x-oar-command-id: "actors.list"
      x-oar-cli-path: "actors list"
      x-oar-why: "Resolve available actor identities for routing writes."
      x-oar-examples:
        - title: List actors
          command: oar actors list --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ actors }` ordered by created time ascending."
      x-oar-error-codes: [actor_registry_unavailable]
      x-oar-concepts: [identity]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Safe and idempotent."
      responses:
        '200':
          description: Actor list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActorsResponse'

  /auth/agents/register:
    post:
      operationId: registerAgent
      summary: Register agent principal and initial key
      tags: [auth]
      x-oar-command-id: "auth.agents.register"
      x-oar-cli-path: "auth agents register"
      x-oar-why: "Bootstrap an authenticated agent identity and obtain initial access + refresh tokens."
      x-oar-examples:
        - title: Register agent
          command: oar auth agents register --username agent.one --public-key <base64-ed25519-pubkey> --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ agent, key, tokens }`."
      x-oar-error-codes: [invalid_json, invalid_request, username_taken]
      x-oar-concepts: [auth, identity]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Registration is open in v0; future invite/secret gating can wrap this endpoint."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterAgentRequest'
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterAgentResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /auth/token:
    post:
      operationId: issueAuthToken
      summary: Mint or refresh token bundle
      tags: [auth]
      x-oar-command-id: "auth.token"
      x-oar-cli-path: "auth token"
      x-oar-why: "Exchange a refresh token or key assertion for a fresh token bundle."
      x-oar-examples:
        - title: Refresh token grant
          command: oar auth token --grant-type refresh_token --refresh-token <token> --json
        - title: Assertion grant
          command: oar auth token --grant-type assertion --agent-id <id> --key-id <id> --signed-at <rfc3339> --signature <base64> --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ tokens }`."
      x-oar-error-codes: [invalid_json, invalid_request, invalid_token, key_mismatch, agent_revoked]
      x-oar-concepts: [auth, token-lifecycle]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Refresh tokens are one-time use and rotated on successful exchange."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthTokenRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /agents/me:
    get:
      operationId: getCurrentAgent
      summary: Read authenticated agent profile
      tags: [auth]
      x-oar-command-id: "agents.me.get"
      x-oar-cli-path: "agents me get"
      x-oar-why: "Inspect current principal metadata and active/revoked keys."
      x-oar-examples:
        - title: Get current profile
          command: oar agents me get --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ agent, keys }`."
      x-oar-error-codes: [auth_required, invalid_token, agent_revoked]
      x-oar-concepts: [auth, identity]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Requires Bearer access token."
      responses:
        '200':
          description: Current agent profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentAgentResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      operationId: patchCurrentAgent
      summary: Update authenticated agent profile
      tags: [auth]
      x-oar-command-id: "agents.me.patch"
      x-oar-cli-path: "agents me patch"
      x-oar-why: "Rename the authenticated agent without re-registration."
      x-oar-examples:
        - title: Rename current agent
          command: oar agents me patch --username renamed_agent --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ agent }`."
      x-oar-error-codes: [auth_required, invalid_token, agent_revoked, invalid_request, username_taken]
      x-oar-concepts: [auth, identity]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Requires Bearer access token."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchCurrentAgentRequest'
      responses:
        '200':
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentAgentPatchResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /agents/me/keys/rotate:
    post:
      operationId: rotateCurrentAgentKey
      summary: Rotate authenticated agent key
      tags: [auth]
      x-oar-command-id: "agents.me.keys.rotate"
      x-oar-cli-path: "agents me keys rotate"
      x-oar-why: "Replace the assertion key and invalidate the old key path."
      x-oar-examples:
        - title: Rotate key
          command: oar agents me keys rotate --public-key <base64-ed25519-pubkey> --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ key }` for the new active key."
      x-oar-error-codes: [auth_required, invalid_token, agent_revoked, invalid_request]
      x-oar-concepts: [auth, key-management]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Old keys are marked revoked and cannot mint assertion tokens."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateKeyRequest'
      responses:
        '200':
          description: Key rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotateKeyResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /agents/me/revoke:
    post:
      operationId: revokeCurrentAgent
      summary: Self-revoke current agent principal
      tags: [auth]
      x-oar-command-id: "agents.me.revoke"
      x-oar-cli-path: "agents me revoke"
      x-oar-why: "Permanently revoke the authenticated agent so future mint/refresh calls fail."
      x-oar-examples:
        - title: Revoke self
          command: oar agents me revoke --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ ok: true }` on first successful revoke."
      x-oar-error-codes: [auth_required, invalid_token, agent_revoked]
      x-oar-concepts: [auth, revocation]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Requires Bearer access token."
      responses:
        '200':
          description: Agent revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OKResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /threads:
    post:
      operationId: createThread
      summary: Create thread snapshot
      tags: [threads]
      x-oar-command-id: "threads.create"
      x-oar-cli-path: "threads create"
      x-oar-why: "Open a new thread for tracking ongoing organizational work."
      x-oar-examples:
        - title: Create thread
          command: oar threads create --from-file thread.json --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ thread }` including generated id and audit fields."
      x-oar-error-codes: [invalid_json, invalid_request, unknown_actor_id]
      x-oar-concepts: [threads, snapshots]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Non-idempotent unless caller enforces a deterministic id strategy externally."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateThreadRequest'
      responses:
        '201':
          description: Thread created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    get:
      operationId: listThreads
      summary: List thread snapshots
      tags: [threads]
      x-oar-command-id: "threads.list"
      x-oar-cli-path: "threads list"
      x-oar-why: "Retrieve current thread state for triage and scheduling decisions."
      x-oar-examples:
        - title: List active p1 threads
          command: oar threads list --status active --priority p1 --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ threads }`; query filters are additive."
      x-oar-error-codes: [invalid_request]
      x-oar-concepts: [threads, filtering]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Safe and idempotent."
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: priority
          schema: { type: string }
        - in: query
          name: tag
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - in: query
          name: cadence
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - in: query
          name: stale
          schema: { type: boolean }
      responses:
        '200':
          description: Thread list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadsResponse'

  /threads/{thread_id}:
    get:
      operationId: getThread
      summary: Get thread snapshot by id
      tags: [threads]
      x-oar-command-id: "threads.get"
      x-oar-cli-path: "threads get"
      x-oar-why: "Resolve a raw authoritative thread snapshot for low-level reads before patching or composing packets."
      x-oar-examples:
        - title: Read thread
          command: oar threads get --thread-id thread_123 --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ thread }`."
      x-oar-error-codes: [not_found]
      x-oar-concepts: [threads]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Safe and idempotent. Prefer `oar threads inspect` for operator coordination reads."
      parameters:
        - $ref: '#/components/parameters/ThreadID'
      responses:
        '200':
          description: Thread payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      operationId: patchThread
      summary: Patch thread snapshot
      tags: [threads]
      x-oar-command-id: "threads.patch"
      x-oar-cli-path: "threads patch"
      x-oar-why: "Update mutable thread fields while preserving unknown data and auditability."
      x-oar-examples:
        - title: Patch thread
          command: oar threads patch --thread-id thread_123 --from-file patch.json --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ thread }` after patch merge and emitted event side effect."
      x-oar-error-codes: [invalid_json, invalid_request, unknown_actor_id, conflict, not_found]
      x-oar-concepts: [threads, patch]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Use `if_updated_at` for optimistic concurrency."
      parameters:
        - $ref: '#/components/parameters/ThreadID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchThreadRequest'
      responses:
        '200':
          description: Thread patched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /threads/{thread_id}/timeline:
    get:
      operationId: getThreadTimeline
      summary: Get thread timeline events and referenced entities
      tags: [threads]
      x-oar-command-id: "threads.timeline"
      x-oar-cli-path: "threads timeline"
      x-oar-why: "Retrieve narrative event history plus referenced snapshots/artifacts in one call."
      x-oar-examples:
        - title: Timeline
          command: oar threads timeline --thread-id thread_123 --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ events, snapshots, artifacts }` where snapshot/artifact maps are sparse."
      x-oar-error-codes: [not_found]
      x-oar-concepts: [threads, events, provenance]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Events stay time ordered; missing refs are omitted from expansion maps."
      parameters:
