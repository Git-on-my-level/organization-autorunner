        title: { type: string }
        subject_ref: { $ref: '#/components/schemas/TypedRef' }
        body_markdown: { type: string }
        summary: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [title, subject_ref, body_markdown, refs, provenance]

    DocumentRevisionCreateInput:
      type: object
      properties:
        body_markdown: { type: string }
        summary: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [body_markdown, refs, provenance]

    BoardCreateInput:
      type: object
      properties:
        title: { type: string }
        status:
          type: string
          enum: [active, paused, archived]
        primary_topic_ref: { $ref: '#/components/schemas/TypedRef' }
        primary_thread_ref: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        pinned_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [title, status, document_refs, pinned_refs, provenance]

    BoardPatchInput:
      type: object
      properties:
        title: { type: string }
        status:
          type: string
          enum: [active, paused, archived]
        primary_topic_ref: { $ref: '#/components/schemas/TypedRef' }
        primary_thread_ref: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        pinned_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }

    CardCreateInput:
      type: object
      properties:
        id: { type: string }
        topic_ref: { $ref: '#/components/schemas/TypedRef' }
        thread_ref: { $ref: '#/components/schemas/TypedRef' }
        document_ref: { $ref: '#/components/schemas/TypedRef' }
        title: { type: string }
        summary: { type: string }
        column_key:
          type: string
          enum: [backlog, ready, in_progress, blocked, review, done]
        assignee_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        risk:
          type: string
