openapi: 3.1.0
info:
  title: Organization Autorunner HTTP API
  version: 0.3.0
  description: |
    Canonical workspace HTTP contract for Organization Autorunner.

    Topics and cards are the primary durable resources. Threads remain backing
    infrastructure surfaced through read-only inspection and workspace views.
servers:
  - url: http://127.0.0.1:8000
x-oar-extension-vocabulary:
  x-oar-command-id: Stable command identifier.
  x-oar-cli-path: CLI path segments.
  x-oar-why: Why the command exists.
  x-oar-input-mode: none | json-body | raw-stream | file-and-body
  x-oar-streaming: Streaming characteristics for the operation.
  x-oar-output-envelope: Output shape and stability notes.
  x-oar-error-codes: Stable semantic error codes.
  x-oar-concepts: Concept tags for generated docs and help.
  x-oar-stability: experimental | beta | stable
  x-oar-surface: canonical | projection | diagnostic | utility
  x-oar-agent-notes: Idempotency, retries, and protocol caveats.
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Liveness check
      tags: [meta]
      x-oar-surface: utility
      x-oar-command-id: meta.health
      x-oar-cli-path: meta health
      x-oar-why: Probe whether the core process is alive.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ ok: true }`."
      x-oar-error-codes: []
      x-oar-concepts: [health]
      x-oar-stability: stable
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /readyz:
    get:
      operationId: readinessCheck
      summary: Readiness check
      tags: [meta]
      x-oar-surface: utility
      x-oar-command-id: meta.readyz
      x-oar-cli-path: meta readyz
      x-oar-why: Verify storage and projection subsystems are ready for traffic.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ ok: true }` when the workspace is ready."
      x-oar-error-codes: [storage_unavailable]
      x-oar-concepts: [health, readiness]
      x-oar-stability: stable
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /version:
    get:
      operationId: getVersion
      summary: Get contract version
      tags: [meta]
      x-oar-surface: utility
      x-oar-command-id: meta.version
      x-oar-cli-path: meta version
      x-oar-why: Check compatibility between clients and core before writes.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ schema_version, command_registry_digest }`."
      x-oar-error-codes: []
      x-oar-concepts: [compatibility]
      x-oar-stability: stable
      responses:
        '200':
          description: Version payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'

  /topics:
    get:
      operationId: listTopics
      summary: List topics
      tags: [topics]
      x-oar-surface: canonical
      x-oar-command-id: topics.list
      x-oar-cli-path: topics list
      x-oar-why: Scan the durable topic inventory.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ topics }`."
      x-oar-error-codes: [auth_required, invalid_token]
      x-oar-concepts: [topics]
      x-oar-stability: beta
      parameters:
        - name: type
          in: query
          required: false
          schema: { type: string }
          description: Filter by topic type enum.
        - name: status
          in: query
          required: false
          schema: { type: string }
          description: Filter by topic status enum.
        - name: q
          in: query
          required: false
          schema: { type: string }
          description: Search topics by id or title substring.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          description: Page size; omit to return the full matching set.
        - name: cursor
          in: query
          required: false
          schema: { type: string }
          description: Opaque pagination cursor from a previous list response.
        - name: include_archived
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: archived_only
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: include_trashed
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: trashed_only
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Topic list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicsResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    post:
      operationId: createTopic
      summary: Create topic
      tags: [topics]
      x-oar-surface: canonical
      x-oar-command-id: topics.create
      x-oar-cli-path: topics create
      x-oar-why: Create a first-class durable topic before attaching cards, docs, or packets.
      x-oar-input-mode: json-body
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ topic }`."
      x-oar-error-codes: [auth_required, invalid_request, invalid_token]
      x-oar-concepts: [topics, write]
      x-oar-stability: beta
      x-oar-agent-notes: "Replay-safe when the same request key and body are reused."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTopicRequest'
      responses:
        '201':
          description: Topic created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}:
    get:
      operationId: getTopic
      summary: Get topic
      tags: [topics]
      x-oar-surface: canonical
      x-oar-command-id: topics.get
      x-oar-cli-path: topics get
      x-oar-why: Resolve one topic and its canonical durable fields.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ topic }`."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [topics]
      x-oar-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      responses:
        '200':
          description: Topic payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      operationId: patchTopic
      summary: Patch topic
      tags: [topics]
      x-oar-surface: canonical
      x-oar-command-id: topics.patch
      x-oar-cli-path: topics patch
      x-oar-why: Update topic state with provenance and optimistic concurrency.
      x-oar-input-mode: json-body
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ topic }`."
      x-oar-error-codes: [auth_required, invalid_request, invalid_token, not_found, conflict]
      x-oar-concepts: [topics, write, concurrency]
      x-oar-stability: beta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTopicRequest'
      parameters:
        - $ref: '#/components/parameters/TopicID'
      responses:
        '200':
          description: Topic patched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/timeline:
    get:
      operationId: getTopicTimeline
      summary: Get topic timeline
      tags: [topics]
      x-oar-surface: projection
      x-oar-command-id: topics.timeline
      x-oar-cli-path: topics timeline
      x-oar-why: Load chronological evidence and related resources for one topic.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ topic, events, artifacts, cards, documents, threads }`."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [topics, timeline]
      x-oar-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      responses:
        '200':
          description: Topic timeline payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicTimelineResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/workspace:
    get:
      operationId: getTopicWorkspace
      summary: Get topic workspace (primary operator coordination read)
      tags: [topics]
      x-oar-surface: projection
      x-oar-command-id: topics.workspace
      x-oar-cli-path: topics workspace
      x-oar-why: Primary operator coordination read — load the topic workspace composed from linked cards, docs, backing threads, and inbox items. Prefer this over thread workspace for triage and planning.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ topic, cards, boards, documents, threads, inbox, projection_freshness, generated_at }`."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [topics, workspace]
      x-oar-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      responses:
        '200':
          description: Topic workspace payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicWorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/archive:
    post:
      operationId: archiveTopic
      summary: Archive topic
      tags: [topics]
      x-oar-surface: canonical
      x-oar-command-id: topics.archive
      x-oar-cli-path: topics archive
      x-oar-why: Soft-archive a topic (orthogonal to business status; clears default list visibility).
      x-oar-input-mode: json-body
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ topic }`."
      x-oar-error-codes: [auth_required, invalid_request, invalid_token, not_found, conflict]
      x-oar-concepts: [topics, write]
      x-oar-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicLifecycleMutationRequest'
      responses:
        '200':
          description: Topic archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/unarchive:
    post:
      operationId: unarchiveTopic
      summary: Unarchive topic
      tags: [topics]
      x-oar-surface: canonical
      x-oar-command-id: topics.unarchive
      x-oar-cli-path: topics unarchive
      x-oar-why: Clear archived_at on a topic (restore default list visibility).
      x-oar-input-mode: json-body
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ topic }`."
      x-oar-error-codes: [auth_required, invalid_request, invalid_token, not_found, conflict]
      x-oar-concepts: [topics, write]
      x-oar-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicLifecycleMutationRequest'
      responses:
        '200':
          description: Topic unarchived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/trash:
    post:
      operationId: trashTopic
      summary: Move topic to trash
      tags: [topics]
      x-oar-surface: canonical
      x-oar-command-id: topics.trash
      x-oar-cli-path: topics trash
      x-oar-why: Move topic to trash with an explicit operator reason.
      x-oar-input-mode: json-body
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ topic }`."
      x-oar-error-codes: [auth_required, invalid_request, invalid_token, not_found, conflict]
      x-oar-concepts: [topics, write]
      x-oar-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicTrashRequest'
      responses:
        '200':
          description: Topic moved to trash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/restore:
    post:
      operationId: restoreTopic
      summary: Restore topic from trash
      tags: [topics]
      x-oar-surface: canonical
      x-oar-command-id: topics.restore
      x-oar-cli-path: topics restore
      x-oar-why: Clear trash lifecycle fields on a topic after an explicit restore action.
      x-oar-input-mode: json-body
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ topic }`."
      x-oar-error-codes: [auth_required, invalid_request, invalid_token, not_found, conflict]
      x-oar-concepts: [topics, write]
      x-oar-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicLifecycleMutationRequest'
      responses:
        '200':
          description: Topic restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /ref-edges:
    get:
      operationId: listRefEdges
      summary: List ref edges (forward or reverse indexed lookup)
      tags: [refs]
      x-oar-surface: diagnostic
      x-oar-command-id: ref_edges.list
      x-oar-cli-path: ref-edges list
      x-oar-why: Query the write-through ref index by source or target (mutually exclusive); reverse lookup uses target_type+target_id.
      x-oar-input-mode: query
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ ref_edges }`."
      x-oar-error-codes: [auth_required, invalid_request, invalid_token]
      x-oar-concepts: [refs, inspection]
      x-oar-stability: beta
      parameters:
        - name: source_type
          in: query
          required: false
          schema: { type: string }
        - name: source_id
          in: query
          required: false
          schema: { type: string }
        - name: target_type
          in: query
          required: false
          schema: { type: string }
        - name: target_id
          in: query
          required: false
          schema: { type: string }
        - name: edge_type
          in: query
          required: false
          description: When set, filter results to this edge_type.
          schema: { type: string }
      responses:
        '200':
          description: Ref edge rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefEdgesResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /threads:
    get:
      operationId: listThreads
      summary: List backing threads
      tags: [threads]
      x-oar-surface: diagnostic
      x-oar-command-id: threads.list
      x-oar-cli-path: threads list
      x-oar-why: Inspect backing infrastructure threads without making them the primary planning noun.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ threads }`."
      x-oar-error-codes: [auth_required, invalid_token]
      x-oar-concepts: [threads, inspection]
      x-oar-stability: beta
      responses:
        '200':
          description: Thread list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadsResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /threads/{thread_id}:
    get:
      operationId: getThread
      summary: Inspect backing thread
      tags: [threads]
      x-oar-surface: diagnostic
      x-oar-command-id: threads.inspect
      x-oar-cli-path: threads inspect
      x-oar-why: Resolve one backing thread for low-level inspection and diagnostics.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ thread }`."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [threads, inspection]
      x-oar-stability: beta
      parameters:
        - $ref: '#/components/parameters/ThreadID'
      responses:
        '200':
          description: Thread payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /threads/{thread_id}/timeline:
    get:
      operationId: getThreadTimeline
      summary: Get backing thread timeline
      tags: [threads]
      x-oar-surface: projection
      x-oar-command-id: threads.timeline
      x-oar-cli-path: threads timeline
      x-oar-why: Retrieve event history plus typed-ref expansions for one backing thread.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ thread, events, artifacts, topics, cards, documents }`."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [threads, timeline]
      x-oar-stability: beta
      parameters:
        - $ref: '#/components/parameters/ThreadID'
      responses:
        '200':
          description: Thread timeline payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadTimelineResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /threads/{thread_id}/context:
    get:
      operationId: getThreadContext
      summary: Get backing thread coordination context
      tags: [threads]
      x-oar-surface: projection
      x-oar-command-id: threads.context
      x-oar-cli-path: threads context
      x-oar-why: Load a compact coordination bundle (thread, recent events, key artifacts, cards, documents) for inspection and triage.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ thread, recent_events, key_artifacts, open_cards, documents }` plus forward-compatible fields."
      x-oar-error-codes: [auth_required, invalid_request, invalid_token, not_found]
      x-oar-concepts: [threads, inspection]
      x-oar-stability: beta
      parameters:
        - $ref: '#/components/parameters/ThreadID'
        - name: max_events
          in: query
          required: false
          description: Cap on recent timeline events included (non-negative integer).
          schema:
            type: integer
            minimum: 0
        - name: include_artifact_content
          in: query
          required: false
          description: When true, include short text previews for key artifacts where content is available.
          schema:
            type: boolean
      responses:
        '200':
          description: Thread context bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadContextResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /threads/{thread_id}/workspace:
    get:
      operationId: getThreadWorkspace
      summary: Get backing thread workspace projection (diagnostic)
      tags: [threads]
      x-oar-surface: projection
      x-oar-command-id: threads.workspace
      x-oar-cli-path: threads workspace
      x-oar-why: Read-only diagnostic projection that bundles context, inbox, and related-thread signals for one backing thread. Prefer topics.workspace for normal operator coordination when a topic exists.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ thread, related_topics, cards, documents, board_memberships, inbox, projection_freshness }`."
      x-oar-error-codes: [auth_required, invalid_token, not_found]
      x-oar-concepts: [threads, workspace]
      x-oar-stability: beta
      parameters:
        - $ref: '#/components/parameters/ThreadID'
      responses:
        '200':
          description: Thread workspace payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadWorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /docs:
    get:
      operationId: listDocuments
      summary: List documents
      tags: [docs]
      x-oar-surface: canonical
      x-oar-command-id: docs.list
      x-oar-cli-path: docs list
      x-oar-why: Scan canonical document lineages.
      x-oar-input-mode: none
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ documents }`."
      x-oar-error-codes: [auth_required, invalid_token]
      x-oar-concepts: [docs]
      x-oar-stability: beta
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentsResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    post:
      operationId: createDocument
      summary: Create document
      tags: [docs]
      x-oar-surface: canonical
      x-oar-command-id: docs.create
      x-oar-cli-path: docs create
      x-oar-why: Create a canonical document lineage anchored to a typed subject ref.
      x-oar-input-mode: json-body
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ document, revision }`."
      x-oar-error-codes: [auth_required, invalid_request, invalid_token]
      x-oar-concepts: [docs, write]
      x-oar-stability: beta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Document created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentWithRevisionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
