          enum: [proposed, active, blocked, resolved, archived]
        title: { type: string }
        summary: { type: string }
        owner_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        primary_thread_ref: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        board_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [type, status, title, summary, owner_refs, document_refs, board_refs, related_refs, provenance]

    TopicPatchInput:
      type: object
      properties:
        type:
          type: string
          enum: [initiative, objective, decision, incident, risk, request, note, other]
        status:
          type: string
          enum: [proposed, active, blocked, resolved, archived]
        title: { type: string }
        summary: { type: string }
        owner_refs:
          type: array
