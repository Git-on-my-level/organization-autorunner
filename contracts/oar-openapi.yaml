          $ref: '#/components/responses/ErrorResponse'

  /inbox/ack:
    post:
      operationId: acknowledgeInboxItemLegacy
      summary: Acknowledge inbox item (legacy body-only path)
      description: >
        Compatibility alias for clients that post the inbox item id in the JSON body
        (`inbox_item_id`) instead of using `POST /inbox/{inbox_id}/acknowledge`. Prefer the
        path-parameter form for new integrations.
      deprecated: true
      tags: [inbox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcknowledgeInboxItemRequest'
      responses:
        '201':
          description: Acknowledgment event appended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgeInboxItemResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

components:
  responses:
    ErrorResponse:
      description: Error payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  parameters:
    TopicID:
      in: path
      name: topic_id
      required: true
      schema: { type: string }
    ThreadID:
      in: path
      name: thread_id
      required: true
      schema: { type: string }
    DocumentID:
      in: path
      name: document_id
      required: true
      schema: { type: string }
    RevisionID:
      in: path
      name: revision_id
      required: true
      schema: { type: string }
    BoardID:
      in: path
      name: board_id
      required: true
      schema: { type: string }
    CardID:
      in: path
      name: card_id
      required: true
      schema: { type: string }
    ArtifactID:
      in: path
      name: artifact_id
      required: true
      schema: { type: string }
    InboxID:
      in: path
      name: inbox_id
      required: true
      schema: { type: string }

  schemas:
    Error:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }
      required: [code, message]

    HealthResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    VersionResponse:
      type: object
      properties:
        schema_version: { type: string }
        command_registry_digest: { type: string }
      required: [schema_version, command_registry_digest]

    TypedRef:
      type: string
      description: Typed ref string such as `topic:roadmap` or `artifact:art_123`.

    Provenance:
      type: object
      properties:
        sources:
          type: array
          items: { type: string }
        notes: { type: string }
        by_field:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
      required: [sources]

    ProjectionFreshness:
      type: object
      properties:
        state:
          type: string
          enum: [current, pending, missing, error]
        generated_at:
          type: string
          format: date-time
        detail:
          type: string
      required: [state]

    Event:
      type: object
      properties:
        id: { type: string }
        ts: { type: string, format: date-time }
        type: { type: string }
        actor_id: { type: string }
        thread_ref: { $ref: '#/components/schemas/TypedRef' }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        summary: { type: string }
        payload:
          type: object
          additionalProperties: true
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [id, ts, type, actor_id, refs, summary, provenance]

    Artifact:
      type: object
      properties:
        id: { type: string }
        kind: { type: string }
        content_type: { type: string }
        content_hash: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        summary: { type: string }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
      required: [id, kind, content_type, content_hash, refs, created_at, created_by]

    Thread:
      type: object
      properties:
        id: { type: string }
        topic_ref: { $ref: '#/components/schemas/TypedRef' }
        title: { type: string }
        status:
          type: string
          enum: [active, archived]
        priority:
          type: string
          enum: [p0, p1, p2, p3]
        tags:
          type: array
          items: { type: string }
        latest_event_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_at: { type: string, format: date-time }
        updated_by: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [id, title, status, priority, tags, created_at, created_by, updated_at, updated_by, provenance]

    Topic:
      type: object
      properties:
        id: { type: string }
        type:
          type: string
          enum: [initiative, objective, decision, incident, risk, request, note, other]
        status:
          type: string
          enum: [proposed, active, blocked, resolved, archived]
        title: { type: string }
        summary: { type: string }
        owner_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        primary_thread_ref: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        board_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_at: { type: string, format: date-time }
        updated_by: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required:
        [id, type, status, title, summary, owner_refs, document_refs, board_refs, related_refs,
         created_at, created_by, updated_at, updated_by, provenance]

    Document:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        subject_ref: { $ref: '#/components/schemas/TypedRef' }
        head_revision_ref: { $ref: '#/components/schemas/TypedRef' }
        state: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_at: { type: string, format: date-time }
        updated_by: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required:
        [id, title, subject_ref, head_revision_ref, state, refs, created_at, created_by, updated_at, updated_by, provenance]

    DocumentRevision:
      type: object
      properties:
        revision_id: { type: string }
        document_ref: { $ref: '#/components/schemas/TypedRef' }
        prev_revision_ref: { $ref: '#/components/schemas/TypedRef' }
        artifact_ref: { $ref: '#/components/schemas/TypedRef' }
        revision_number: { type: integer }
        summary: { type: string }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
      required: [revision_id, document_ref, artifact_ref, revision_number, created_at, created_by]

    Board:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        status:
          type: string
          enum: [active, paused, archived]
        primary_topic_ref: { $ref: '#/components/schemas/TypedRef' }
        primary_thread_ref: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        card_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        pinned_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_at: { type: string, format: date-time }
        updated_by: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required:
        [id, title, status, document_refs, card_refs, pinned_refs, created_at, created_by, updated_at, updated_by, provenance]

    Card:
      type: object
      properties:
        id: { type: string }
        board_ref: { $ref: '#/components/schemas/TypedRef' }
        topic_ref: { $ref: '#/components/schemas/TypedRef' }
        thread_ref: { $ref: '#/components/schemas/TypedRef' }
        document_ref: { $ref: '#/components/schemas/TypedRef' }
        title: { type: string }
        summary: { type: string }
        column_key:
          type: string
          enum: [backlog, ready, in_progress, blocked, review, done]
        rank: { type: string }
        assignee_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        risk:
          type: string
          enum: [low, medium, high, critical]
        resolution:
          type: string
          enum: [unresolved, completed, canceled, superseded]
        resolution_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_at: { type: string, format: date-time }
        updated_by: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required:
        [id, board_ref, title, summary, column_key, rank, assignee_refs, risk, resolution, resolution_refs,
         related_refs, created_at, created_by, updated_at, updated_by, provenance]

    BoardSummary:
      type: object
      properties:
        card_count: { type: integer }
        cards_by_column:
          type: object
          additionalProperties: { type: integer }
        unresolved_card_count: { type: integer }
        resolved_card_count: { type: integer }
        document_count: { type: integer }
        latest_activity_at: { type: string, format: date-time }
        has_document_refs: { type: boolean }
