openapi: 3.1.0
info:
  title: Organization Autorunner HTTP API
  version: 0.2.3
  description: |
    Canonical HTTP contract for organization-autorunner.

    This OpenAPI contract is the monorepo source of truth for generated clients,
    CLI command registry metadata, and command docs.

    Core request/abuse controls are surfaced explicitly: oversized requests use
    `request_too_large`, workspace storage exhaustion uses
    `workspace_quota_exceeded`, and route-class throttling uses `rate_limited`.
    When present, the JSON error payload includes `request_body`, `quota`, or
    `rate_limit` detail objects so clients can react without guessing.
servers:
  - url: http://127.0.0.1:8000
x-oar-extension-vocabulary:
  x-oar-command-id: "Stable command identifier (for example: threads.list)"
  x-oar-cli-path: "CLI path segments (for example: threads list)"
  x-oar-why: "Why the command exists and when an agent should use it"
  x-oar-examples: "Deterministic examples for humans and agents"
  x-oar-input-mode: "none | json-body | raw-stream | file-and-body"
  x-oar-streaming: "Streaming characteristics for this operation"
  x-oar-output-envelope: "Output shape and stability notes"
  x-oar-error-codes: "Stable semantic error codes surfaced by core, including request_too_large, workspace_quota_exceeded, and rate_limited"
  x-oar-concepts: "Concept tags for docs/help grouping"
  x-oar-stability: "experimental | beta | stable"
  x-oar-surface: "Surface classification: canonical, projection, or utility"
  x-oar-agent-notes: "Idempotency, retries, and protocol caveats"
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Liveness check
      tags: [meta]
      x-oar-surface: "utility"
      x-oar-command-id: "meta.health"
      x-oar-cli-path: "meta health"
      x-oar-why: "Probe whether the core process is alive with a minimal public liveness payload."
      x-oar-examples:
        - title: Liveness check
          command: oar meta health --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ ok: true }` when the service process is alive."
      x-oar-error-codes: []
      x-oar-concepts: [health, liveness]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Safe and idempotent; retry with backoff on transport failures."
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /livez:
    get:
      operationId: livenessCheck
      summary: Explicit liveness check
      tags: [meta]
      x-oar-surface: "utility"
      x-oar-command-id: "meta.livez"
      x-oar-cli-path: "meta livez"
      x-oar-why: "Provide an explicit Kubernetes-style liveness alias for the minimal public probe."
      x-oar-examples:
        - title: Liveness alias
          command: oar api call --method GET --path /livez
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ ok: true }` when the service process is alive."
      x-oar-error-codes: []
      x-oar-concepts: [health, liveness]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Safe and idempotent."
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /readyz:
    get:
      operationId: readinessCheck
      summary: Readiness check
      tags: [meta]
      x-oar-surface: "utility"
      x-oar-command-id: "meta.readyz"
      x-oar-cli-path: "meta readyz"
      x-oar-why: "Probe whether core storage is ready before issuing stateful commands or marking the instance ready."
      x-oar-examples:
        - title: Readiness check
          command: oar api call --method GET --path /readyz
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ ok: true }` when the service and storage are ready."
      x-oar-error-codes: [storage_unavailable]
      x-oar-concepts: [health, readiness]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Safe and idempotent; retry with backoff on transport failures."
      responses:
        '200':
          description: Service and storage are ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /ops/health:
    get:
      operationId: opsHealthCheck
      summary: Operator diagnostics health
      tags: [meta]
      x-oar-surface: "utility"
      x-oar-command-id: "meta.ops.health"
      x-oar-cli-path: "meta ops health"
      x-oar-why: "Inspect detailed operator diagnostics such as projection-maintenance lag without exposing them on the public liveness/readiness probes."
      x-oar-examples:
        - title: Authenticated operator diagnostics
          command: "oar api call --method GET --path /ops/health --header 'Authorization: Bearer <access-token>'"
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ ok, projection_maintenance? }` after the readiness check passes."
      x-oar-error-codes: [auth_required, invalid_token, agent_revoked, storage_unavailable]
      x-oar-concepts: [health, readiness, operations]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Requires an authenticated principal outside development-mode and loopback verification exceptions. Safe and idempotent."
      responses:
        '200':
          description: Operator diagnostics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsHealthResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /version:
    get:
      operationId: getVersion
      summary: Get schema contract version
      tags: [meta]
      x-oar-surface: "utility"
      x-oar-command-id: "meta.version"
      x-oar-cli-path: "meta version"
      x-oar-why: "Verify compatibility between core and generated clients before performing writes."
      x-oar-examples:
        - title: Read version
          command: oar meta version --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ schema_version, command_registry_digest }` for frontend/core compatibility checks."
      x-oar-error-codes: []
      x-oar-concepts: [compatibility, schema]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Safe and idempotent."
      responses:
        '200':
          description: Version payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'

  /meta/handshake:
    get:
      operationId: getMetaHandshake
      summary: Get compatibility handshake metadata
      tags: [meta]
      x-oar-surface: "utility"
      x-oar-command-id: "meta.handshake"
      x-oar-cli-path: "meta handshake"
      x-oar-why: "Discover compatibility, upgrade, and instance identity metadata before command execution."
      x-oar-examples:
        - title: Read handshake metadata
          command: oar meta handshake --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns compatibility fields including minimum supported CLI version."
      x-oar-error-codes: []
      x-oar-concepts: [compatibility, handshake]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent. Use this endpoint to proactively gate incompatible CLI versions."
      responses:
        '200':
          description: Compatibility handshake
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandshakeResponse'

  /meta/commands:
    get:
      operationId: listMetaCommands
      summary: List generated command metadata
      tags: [meta]
      x-oar-surface: "utility"
      x-oar-command-id: "meta.commands.list"
      x-oar-cli-path: "meta commands list"
      x-oar-why: "Load generated command metadata used for help, docs, and agent introspection."
      x-oar-examples:
        - title: List command metadata
          command: oar meta commands list --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns generated command registry metadata from the canonical contract."
      x-oar-error-codes: [meta_unavailable, cli_outdated]
      x-oar-concepts: [meta, introspection]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent. Response shape matches committed generated artifacts."
      responses:
        '200':
          description: Command metadata registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaCommandsResponse'
        '426':
          $ref: '#/components/responses/CLIOutdatedResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /meta/commands/{command_id}:
    get:
      operationId: getMetaCommand
      summary: Get generated metadata for a command id
      tags: [meta]
      x-oar-surface: "utility"
      x-oar-command-id: "meta.commands.get"
      x-oar-cli-path: "meta commands get"
      x-oar-why: "Resolve a stable command id to full generated metadata and guidance."
      x-oar-examples:
        - title: Read command metadata
          command: oar meta commands get --command-id threads.list --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ command }` metadata for the requested command id."
      x-oar-error-codes: [not_found, meta_unavailable, cli_outdated]
      x-oar-concepts: [meta, introspection]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      parameters:
        - $ref: '#/components/parameters/CommandID'
      responses:
        '200':
          description: Command metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaCommandResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '426':
          $ref: '#/components/responses/CLIOutdatedResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /meta/concepts:
    get:
      operationId: listMetaConcepts
      summary: List generated concept metadata
      tags: [meta]
      x-oar-surface: "utility"
      x-oar-command-id: "meta.concepts.list"
      x-oar-cli-path: "meta concepts list"
      x-oar-why: "Discover conceptual groupings of commands generated from contract metadata."
      x-oar-examples:
        - title: List concepts
          command: oar meta concepts list --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ concepts }` summary metadata for all known concepts."
      x-oar-error-codes: [meta_unavailable, cli_outdated]
      x-oar-concepts: [meta, concepts]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      responses:
        '200':
          description: Concept metadata summary list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaConceptsResponse'
        '426':
          $ref: '#/components/responses/CLIOutdatedResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /meta/concepts/{concept_name}:
    get:
      operationId: getMetaConcept
      summary: Get generated metadata for one concept
      tags: [meta]
      x-oar-surface: "utility"
      x-oar-command-id: "meta.concepts.get"
      x-oar-cli-path: "meta concepts get"
      x-oar-why: "Resolve one concept tag to the commands that implement that concept."
      x-oar-examples:
        - title: Read one concept
          command: oar meta concepts get --concept-name compatibility --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ concept }` including matched command ids and command metadata."
      x-oar-error-codes: [not_found, meta_unavailable, cli_outdated]
      x-oar-concepts: [meta, concepts]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Safe and idempotent."
      parameters:
        - $ref: '#/components/parameters/ConceptName'
      responses:
        '200':
          description: Concept metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaConceptResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '426':
          $ref: '#/components/responses/CLIOutdatedResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /actors:
    post:
      operationId: registerActor
      summary: Register actor identity metadata
      tags: [actors]
      x-oar-surface: "utility"
      x-oar-command-id: "actors.register"
      x-oar-cli-path: "actors register"
      x-oar-why: "Bootstrap an authenticated caller identity before mutating thread state."
      x-oar-examples:
        - title: Register actor
          command: oar actors register --id bot-1 --display-name "Bot 1" --created-at 2026-03-04T10:00:00Z --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ actor }` with canonicalized stored values."
      x-oar-error-codes: [invalid_json, invalid_request, actor_exists]
      x-oar-concepts: [identity]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Not idempotent by default; repeated creates with same id return conflict."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterActorRequest'
      responses:
        '201':
          description: Actor created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActorResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
    get:
      operationId: listActors
      summary: List actors
      tags: [actors]
      x-oar-surface: "utility"
      x-oar-command-id: "actors.list"
      x-oar-cli-path: "actors list"
      x-oar-why: "Resolve available actor identities for routing writes."
      x-oar-examples:
        - title: List actors
          command: oar actors list --json
        - title: Search actors by name
          command: oar actors list --q "bot" --json
        - title: Paginated actor list
          command: oar actors list --limit 50 --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ actors, next_cursor? }` ordered by created time ascending. Pagination is optional and backward-compatible."
      x-oar-error-codes: [actor_registry_unavailable]
      x-oar-concepts: [identity]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Safe and idempotent. Optional pagination with `q` for search, `limit` for page size, and `cursor` for continuation."
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: "Optional search query to filter actors by ID or display name using case-insensitive matching."
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
          description: "Maximum number of results to return. Defaults to returning all results when omitted."
        - in: query
          name: cursor
          schema: { type: string }
          description: "Opaque pagination cursor from a previous response's `next_cursor` field."
      responses:
        '200':
          description: Actor list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActorsResponse'

  /auth/agents/register:
    post:
      operationId: registerAgent
      summary: Register agent principal and initial key
      tags: [auth]
      x-oar-surface: "utility"
      x-oar-command-id: "auth.agents.register"
      x-oar-cli-path: "auth register"
      x-oar-why: "Register an agent principal with a bootstrap token for the first principal or an invite token for later principals."
      x-oar-examples:
        - title: Bootstrap first agent
          command: oar auth register --username agent.one --bootstrap-token <token> --json
        - title: Register invited agent
          command: oar auth register --username agent.two --invite-token <token> --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ agent, key, tokens }`."
      x-oar-error-codes: [invalid_json, invalid_request, invalid_token, username_taken]
      x-oar-concepts: [auth, identity]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Bootstrap is accepted only for the first successful principal registration. Later registrations require an invite token."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterAgentRequest'
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterAgentResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /auth/bootstrap/status:
    get:
      operationId: getBootstrapStatus
      summary: Read bootstrap onboarding availability
      tags: [auth]
      x-oar-command-id: "auth.bootstrap.status"
      x-oar-cli-path: "auth bootstrap status"
      x-oar-why: "Check whether first-principal bootstrap registration is still available for this workspace."
      x-oar-examples:
        - title: Read bootstrap status
          command: oar auth bootstrap status --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ bootstrap_registration_available }` without exposing token material."
      x-oar-error-codes: []
      x-oar-concepts: [auth, onboarding]
      x-oar-stability: "beta"
      x-oar-agent-notes: "This endpoint is intentionally non-enumerating beyond the single bootstrap availability boolean."
      responses:
        '200':
          description: Bootstrap status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapStatusResponse'

  /auth/token:
    post:
      operationId: issueAuthToken
      summary: Mint or refresh token bundle
      tags: [auth]
      x-oar-surface: "utility"
      x-oar-command-id: "auth.token"
      x-oar-cli-path: "auth token"
      x-oar-why: "Exchange a refresh token or key assertion for a fresh token bundle."
      x-oar-examples:
        - title: Refresh token grant
          command: oar auth token --grant-type refresh_token --refresh-token <token> --json
        - title: Assertion grant
          command: oar auth token --grant-type assertion --agent-id <id> --key-id <id> --signed-at <rfc3339> --signature <base64> --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ tokens }`."
      x-oar-error-codes: [invalid_json, invalid_request, invalid_token, key_mismatch, agent_revoked]
      x-oar-concepts: [auth, token-lifecycle]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Refresh tokens are one-time use and rotated on successful exchange."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthTokenRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /auth/passkey/register/options:
    post:
      operationId: passkeyRegisterOptions
      summary: Begin passkey registration ceremony
      tags: [auth]
      x-oar-surface: "utility"
      x-oar-command-id: "auth.passkey.register.options"
      x-oar-cli-path: "auth passkey register options"
      x-oar-why: "Create a WebAuthn registration challenge for a human principal during managed bootstrap or invite acceptance."
      x-oar-examples: []
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ session_id, options }` where `options` is a WebAuthn registration payload."
      x-oar-error-codes: [invalid_json, invalid_request, invalid_token]
      x-oar-concepts: [auth, passkey]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Requires a bootstrap token for the first successful human registration or an invite token for later registrations."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterOptionsRequest'
      responses:
        '200':
          description: Passkey registration options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyOptionsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /auth/passkey/register/verify:
    post:
      operationId: passkeyRegisterVerify
      summary: Verify passkey registration and issue tokens
      tags: [auth]
      x-oar-surface: "utility"
      x-oar-command-id: "auth.passkey.register.verify"
      x-oar-cli-path: "auth passkey register verify"
      x-oar-why: "Verify a WebAuthn attestation for managed bootstrap or invite acceptance, create the principal, and issue the initial token bundle."
      x-oar-examples: []
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ agent, tokens }` for the newly registered passkey principal."
      x-oar-error-codes: [invalid_json, invalid_request, invalid_token]
      x-oar-concepts: [auth, passkey]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Session ids are one-time use and expire quickly. The same bootstrap or invite token used to open the registration flow must be presented again here."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyVerifyRequest'
      responses:
        '201':
          description: Passkey principal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAuthResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /auth/invites:
    get:
      operationId: listInvites
      summary: List onboarding invites
      tags: [auth]
      x-oar-command-id: "auth.invites.list"
      x-oar-cli-path: "auth invites list"
      x-oar-why: "Inspect current invite state without exposing token secrets."
      x-oar-examples:
        - title: List invites
          command: oar auth invites list --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ invites }` ordered by create time descending."
      x-oar-error-codes: [auth_required, invalid_token, agent_revoked]
      x-oar-concepts: [auth, onboarding]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Requires Bearer access token. Returned invites contain metadata only, never raw tokens."
      responses:
        '200':
          description: Invite list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListInvitesResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
    post:
      operationId: createInvite
      summary: Create onboarding invite
      tags: [auth]
      x-oar-command-id: "auth.invites.create"
      x-oar-cli-path: "auth invites create"
      x-oar-why: "Mint a single-use invite token for a future human or agent registration."
      x-oar-examples:
        - title: Create agent invite
          command: oar auth invites create --kind agent --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ invite, token }`. The raw token is returned only once at creation time."
      x-oar-error-codes: [auth_required, invalid_json, invalid_request, invalid_token, agent_revoked]
      x-oar-concepts: [auth, onboarding]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Requires Bearer access token. `kind` may be `human`, `agent`, or `any`."
      requestBody:
