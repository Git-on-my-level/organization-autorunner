      x-oar-cli-path: "packets receipts create"
      x-oar-why: "Record execution output and verification evidence for a work order."
      x-oar-examples:
        - title: Create receipt
          command: oar packets receipts create --from-file receipt.json --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ artifact, event }`."
      x-oar-error-codes: [invalid_json, invalid_request, unknown_actor_id]
      x-oar-concepts: [packets, receipts]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Include evidence refs that satisfy packet conventions."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReceiptRequest'
      responses:
        '201':
          description: Packet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacketCreateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /reviews:
    post:
      operationId: createReview
      summary: Create review packet artifact
      tags: [packets]
      x-oar-command-id: "packets.reviews.create"
      x-oar-cli-path: "packets reviews create"
      x-oar-why: "Record acceptance/revision decisions over a receipt."
      x-oar-examples:
        - title: Create review
          command: oar packets reviews create --from-file review.json --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ artifact, event }`."
      x-oar-error-codes: [invalid_json, invalid_request, unknown_actor_id]
      x-oar-concepts: [packets, reviews]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Include refs to both receipt and work order artifacts."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Packet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacketCreateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /inbox:
    get:
      operationId: listInbox
      summary: List derived inbox items
      tags: [inbox]
      x-oar-command-id: "inbox.list"
      x-oar-cli-path: "inbox list"
      x-oar-why: "Surface derived actionable risk and decision signals."
      x-oar-examples:
        - title: List inbox
          command: oar inbox list --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ items, generated_at }`."
      x-oar-error-codes: []
      x-oar-concepts: [inbox, derived-views]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Safe and idempotent."
      parameters:
        - in: query
          name: risk_horizon_days
          schema: { type: integer }
      responses:
        '200':
          description: Inbox items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxResponse'

  /inbox/{inbox_item_id}:
    get:
      operationId: getInboxItem
      summary: Get derived inbox item detail
      tags: [inbox]
      x-oar-command-id: "inbox.get"
      x-oar-cli-path: "inbox get"
      x-oar-why: "Inspect one inbox item in detail before acting on it."
      x-oar-examples:
        - title: Get inbox item by canonical id
          command: oar inbox get --id inbox:decision_needed:thread_123:none:event_123 --json
        - title: Get inbox item by alias
          command: oar inbox get --id ibx_abcd1234ef56 --json
      x-oar-input-mode: "none"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ item, generated_at }` for the requested inbox item."
      x-oar-error-codes: [not_found]
      x-oar-concepts: [inbox, derived-views]
      x-oar-stability: "stable"
      x-oar-agent-notes: "CLI supports canonical ids, aliases, and unique prefixes."
      parameters:
        - in: path
          name: inbox_item_id
          required: true
          schema: { type: string }
        - in: query
          name: risk_horizon_days
          schema: { type: integer }
      responses:
        '200':
          description: Inbox item detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxItemResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /inbox/stream:
    get:
      operationId: streamInbox
      summary: Stream derived inbox items via SSE
      tags: [inbox]
      x-oar-command-id: "inbox.stream"
      x-oar-cli-path: "inbox stream"
      x-oar-why: "Follow live derived inbox updates without repeated polling."
      x-oar-examples:
        - title: Stream inbox updates
          command: oar inbox stream --json
        - title: Resume inbox stream
          command: oar inbox stream --last-event-id <id> --json
      x-oar-input-mode: "none"
      x-oar-streaming:
        mode: sse
        event_type: inbox_item
        resumable: true
      x-oar-output-envelope: "SSE stream where each event carries `{ item }` derived inbox metadata."
      x-oar-error-codes: [internal_error, cli_outdated]
      x-oar-concepts: [inbox, derived-views, streaming]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Supports `Last-Event-ID` header or `last_event_id` query for resumable reads."
      parameters:
        - in: query
          name: risk_horizon_days
          schema: { type: integer }
        - in: query
          name: last_event_id
          schema: { type: string }
        - in: header
          name: Last-Event-ID
          schema: { type: string }
      responses:
        '200':
          description: Inbox stream
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '426':
          $ref: '#/components/responses/CLIOutdatedResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /inbox/ack:
    post:
      operationId: ackInboxItem
      summary: Acknowledge an inbox item
      tags: [inbox]
      x-oar-command-id: "inbox.ack"
      x-oar-cli-path: "inbox ack"
      x-oar-why: "Suppress already-acted-on derived inbox signals."
      x-oar-examples:
        - title: Ack inbox item
          command: oar inbox ack --thread-id thread_123 --inbox-item-id inbox:item-1 --json
        - title: Ack inbox item by id
          command: oar inbox ack inbox:decision_needed:thread_123:none:event_1 --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ event }` representing acknowledgment."
      x-oar-error-codes: [invalid_json, invalid_request, unknown_actor_id]
      x-oar-concepts: [inbox, events]
      x-oar-stability: "stable"
      x-oar-agent-notes: "Idempotent at semantic level; repeated acks should not duplicate active inbox items."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AckInboxRequest'
      responses:
        '201':
          description: Ack event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /derived/rebuild:
    post:
      operationId: rebuildDerivedViews
      summary: Rebuild derived views
      tags: [derived]
      x-oar-command-id: "derived.rebuild"
      x-oar-cli-path: "derived rebuild"
      x-oar-why: "Force deterministic recomputation of derived views after maintenance or migration."
      x-oar-examples:
        - title: Rebuild derived
          command: oar derived rebuild --actor-id system --json
      x-oar-input-mode: "json-body"
      x-oar-streaming: { mode: none }
      x-oar-output-envelope: "Returns `{ ok: true }`."
      x-oar-error-codes: [invalid_json, invalid_request, unknown_actor_id]
      x-oar-concepts: [derived-views, maintenance]
      x-oar-stability: "beta"
      x-oar-agent-notes: "Mutating admin command; serialize with other writes."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorOnlyRequest'
      responses:
        '200':
          description: Rebuild complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OKResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

components:
  parameters:
    ThreadID:
      in: path
      name: thread_id
      required: true
      schema: { type: string }
    SnapshotID:
      in: path
      name: snapshot_id
      required: true
      schema: { type: string }
    CommitmentID:
      in: path
      name: commitment_id
      required: true
      schema: { type: string }
    EventID:
      in: path
      name: event_id
      required: true
      schema: { type: string }
    ArtifactID:
      in: path
      name: artifact_id
      required: true
      schema: { type: string }
    DocumentID:
      in: path
      name: document_id
      required: true
      schema: { type: string }
    RevisionID:
      in: path
      name: revision_id
      required: true
      schema: { type: string }
    CommandID:
      in: path
      name: command_id
      required: true
      schema: { type: string }
    ConceptName:
      in: path
      name: concept_name
      required: true
      schema: { type: string }

  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    CLIOutdatedResponse:
      description: CLI version is below minimum compatibility version
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CLIOutdatedErrorEnvelope'

  schemas:
    AnyObject:
      type: object
      additionalProperties: true

    HealthResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    VersionResponse:
      type: object
      properties:
        schema_version: { type: string }
      required: [schema_version]

    HandshakeResponse:
      type: object
      properties:
        core_version: { type: string }
        api_version: { type: string }
        schema_version: { type: string }
        min_cli_version: { type: string }
        recommended_cli_version: { type: string }
        cli_download_url: { type: string }
        core_instance_id: { type: string }
      required:
        - core_version
        - api_version
        - schema_version
        - min_cli_version
        - recommended_cli_version
        - cli_download_url
        - core_instance_id

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            recoverable: { type: boolean }
            hint: { type: string }
          required: [code, message, recoverable, hint]
      required: [error]

    CLIOutdatedErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [cli_outdated]
            message:
              type: string
            recoverable: { type: boolean }
            hint: { type: string }
          required: [code, message, recoverable, hint]
        upgrade:
          type: object
          properties:
            min_cli_version: { type: string }
            recommended_cli_version: { type: string }
            cli_download_url: { type: string }
          required: [min_cli_version, recommended_cli_version, cli_download_url]
      required: [error, upgrade]

    MetaCommandMetadata:
      type: object
      additionalProperties: true

    MetaCommandsResponse:
      type: object
      properties:
        openapi_version: { type: string }
        contract_version: { type: string }
        generated_by: { type: string }
        extension_prefix: { type: string }
        command_count: { type: integer }
        commands:
          type: array
          items:
            $ref: '#/components/schemas/MetaCommandMetadata'
      required: [openapi_version, contract_version, generated_by, extension_prefix, command_count, commands]

    MetaCommandResponse:
      type: object
      properties:
        command:
          $ref: '#/components/schemas/MetaCommandMetadata'
      required: [command]

    MetaConceptSummary:
      type: object
      properties:
        name: { type: string }
        command_count: { type: integer }
        command_ids:
          type: array
          items: { type: string }
      required: [name, command_count, command_ids]

    MetaConceptsResponse:
      type: object
      properties:
        concepts:
          type: array
          items:
            $ref: '#/components/schemas/MetaConceptSummary'
      required: [concepts]

    MetaConceptDetail:
      type: object
      properties:
        name: { type: string }
        command_count: { type: integer }
        command_ids:
          type: array
          items: { type: string }
        commands:
          type: array
          items:
            $ref: '#/components/schemas/MetaCommandMetadata'
      required: [name, command_count, command_ids, commands]

    MetaConceptResponse:
      type: object
      properties:
        concept:
          $ref: '#/components/schemas/MetaConceptDetail'
      required: [concept]

    Actor:
      type: object
      additionalProperties: true

    Event:
      type: object
      additionalProperties: true

    Snapshot:
      type: object
      additionalProperties: true

    Thread:
      type: object
      additionalProperties: true

    Commitment:
      type: object
      additionalProperties: true

    Artifact:
      type: object
      additionalProperties: true

    Document:
      type: object
      additionalProperties: true

    DocumentRevision:
      type: object
      additionalProperties: true

    InboxItem:
      type: object
      additionalProperties: true

    RegisterActorRequest:
      type: object
      properties:
        actor:
          $ref: '#/components/schemas/AnyObject'
      required: [actor]

    ActorResponse:
      type: object
      properties:
        actor:
          $ref: '#/components/schemas/Actor'
      required: [actor]

    ActorsResponse:
      type: object
      properties:
        actors:
          type: array
          items:
            $ref: '#/components/schemas/Actor'
      required: [actors]

    Agent:
      type: object
      properties:
        agent_id: { type: string }
        username: { type: string }
        actor_id: { type: string }
        revoked: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [agent_id, username, actor_id, revoked, created_at, updated_at]

    AgentKey:
      type: object
      properties:
        key_id: { type: string }
        agent_id: { type: string }
        algorithm: { type: string }
        public_key: { type: string }
        created_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
      required: [key_id, agent_id, algorithm, public_key, created_at]

    TokenBundle:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string }
        expires_in: { type: integer, format: int64 }
      required: [access_token, refresh_token, token_type, expires_in]

    RegisterAgentRequest:
      type: object
      properties:
        username: { type: string }
        public_key: { type: string }
      required: [username, public_key]

    RegisterAgentResponse:
      type: object
      properties:
        agent:
          $ref: '#/components/schemas/Agent'
        key:
          $ref: '#/components/schemas/AgentKey'
        tokens:
          $ref: '#/components/schemas/TokenBundle'
      required: [agent, key, tokens]

    AuthTokenRequest:
      type: object
      properties:
        grant_type: { type: string }
        refresh_token: { type: string }
        agent_id: { type: string }
        key_id: { type: string }
        signed_at: { type: string, format: date-time }
        signature: { type: string }
      required: [grant_type]

    AuthTokenResponse:
      type: object
      properties:
        tokens:
          $ref: '#/components/schemas/TokenBundle'
      required: [tokens]

    CurrentAgentResponse:
      type: object
      properties:
        agent:
          $ref: '#/components/schemas/Agent'
        keys:
          type: array
          items:
            $ref: '#/components/schemas/AgentKey'
      required: [agent, keys]

    PatchCurrentAgentRequest:
      type: object
      properties:
        username: { type: string }
      required: [username]

    CurrentAgentPatchResponse:
      type: object
      properties:
        agent:
          $ref: '#/components/schemas/Agent'
      required: [agent]

    RotateKeyRequest:
      type: object
      properties:
        public_key: { type: string }
      required: [public_key]

    RotateKeyResponse:
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentKey'
      required: [key]

    ActorOnlyRequest:
      type: object
      properties:
        actor_id: { type: string }

    CreateThreadRequest:
      type: object
      properties:
        actor_id: { type: string }
        thread:
          $ref: '#/components/schemas/AnyObject'
      required: [thread]

    PatchThreadRequest:
      type: object
      properties:
        actor_id: { type: string }
        patch:
          $ref: '#/components/schemas/AnyObject'
        if_updated_at:
          type: string
          format: date-time
      required: [patch]

    ThreadResponse:
      type: object
      properties:
        thread:
          $ref: '#/components/schemas/Thread'
      required: [thread]

    ThreadsResponse:
      type: object
      properties:
        threads:
          type: array
          items:
            $ref: '#/components/schemas/Thread'
      required: [threads]

    ThreadTimelineResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        snapshots:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Snapshot'
        artifacts:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Artifact'
      required: [events, snapshots, artifacts]

    ThreadContextArtifact:
      type: object
      properties:
        ref: { type: string }
        artifact:
          $ref: '#/components/schemas/Artifact'
        content_preview: { type: string }
      required: [ref, artifact]

    ThreadContextResponse:
      type: object
      properties:
        thread:
          $ref: '#/components/schemas/Thread'
        recent_events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        key_artifacts:
          type: array
          items:
            $ref: '#/components/schemas/ThreadContextArtifact'
        open_commitments:
          type: array
          items:
            $ref: '#/components/schemas/Commitment'
      required: [thread, recent_events, key_artifacts, open_commitments]

    SnapshotResponse:
      type: object
      properties:
        snapshot:
          $ref: '#/components/schemas/Snapshot'
      required: [snapshot]

    CreateCommitmentRequest:
      type: object
      properties:
        actor_id: { type: string }
        commitment:
          $ref: '#/components/schemas/AnyObject'
      required: [commitment]

    PatchCommitmentRequest:
      type: object
      properties:
        actor_id: { type: string }
        patch:
          $ref: '#/components/schemas/AnyObject'
        refs:
          type: array
          items: { type: string }
        if_updated_at:
          type: string
          format: date-time
      required: [patch]

    CommitmentResponse:
      type: object
      properties:
        commitment:
          $ref: '#/components/schemas/Commitment'
      required: [commitment]

    CommitmentsResponse:
      type: object
      properties:
        commitments:
          type: array
          items:
            $ref: '#/components/schemas/Commitment'
      required: [commitments]

    CreateDocumentRequest:
      type: object
      properties:
        actor_id: { type: string }
        document:
          $ref: '#/components/schemas/AnyObject'
        refs:
          type: array
          items: { type: string }
        content:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        content_type:
          type: string
          enum: [text, structured, binary]
      required: [document, content, content_type]

    UpdateDocumentRequest:
      type: object
      properties:
        actor_id: { type: string }
        document:
          $ref: '#/components/schemas/AnyObject'
        if_base_revision: { type: string }
        refs:
          type: array
          items: { type: string }
        content:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        content_type:
          type: string
          enum: [text, structured, binary]
      required: [if_base_revision, content, content_type]

    DocumentWithRevisionResponse:
      type: object
      properties:
        document:
          $ref: '#/components/schemas/Document'
        revision:
          $ref: '#/components/schemas/DocumentRevision'
      required: [document, revision]

    DocumentHistoryResponse:
      type: object
      properties:
        document_id: { type: string }
        revisions:
          type: array
          items:
            $ref: '#/components/schemas/DocumentRevision'
      required: [document_id, revisions]

    DocumentRevisionResponse:
      type: object
      properties:
        revision:
          $ref: '#/components/schemas/DocumentRevision'
      required: [revision]

    CreateEventRequest:
      type: object
      properties:
        actor_id: { type: string }
        event:
          $ref: '#/components/schemas/AnyObject'
      description: >
        Conventional event payloads are additive guidance for orchestrators.
        For `event.type="work_order_claimed"`, `event.payload` should include:
        `{ "work_order_id": "<artifact_id>", "actor_id": "<claiming_actor_id>" }`.
      required: [event]

    EventResponse:
      type: object
      properties:
        event:
          $ref: '#/components/schemas/Event'
      required: [event]

    CreateArtifactRequest:
      type: object
      properties:
        actor_id: { type: string }
        artifact:
          $ref: '#/components/schemas/AnyObject'
        content:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        content_type:
          type: string
      required: [artifact, content, content_type]

    ArtifactResponse:
      type: object
      properties:
        artifact:
          $ref: '#/components/schemas/Artifact'
      required: [artifact]

    ArtifactsResponse:
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
      required: [artifacts]

    CreateWorkOrderRequest:
      type: object
      properties:
        actor_id: { type: string }
        artifact:
          $ref: '#/components/schemas/AnyObject'
        packet:
          $ref: '#/components/schemas/AnyObject'
      required: [artifact, packet]

    CreateReceiptRequest:
      type: object
      properties:
        actor_id: { type: string }
        artifact:
          $ref: '#/components/schemas/AnyObject'
        packet:
          $ref: '#/components/schemas/AnyObject'
      required: [artifact, packet]

    CreateReviewRequest:
      type: object
      properties:
        actor_id: { type: string }
        artifact:
          $ref: '#/components/schemas/AnyObject'
        packet:
          $ref: '#/components/schemas/AnyObject'
      required: [artifact, packet]

    PacketCreateResponse:
      type: object
      properties:
        artifact:
          $ref: '#/components/schemas/Artifact'
        event:
          $ref: '#/components/schemas/Event'
      required: [artifact, event]

    InboxResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/InboxItem'
        generated_at:
          type: string
          format: date-time
      required: [items, generated_at]

    InboxItemResponse:
      type: object
      properties:
        item:
          $ref: '#/components/schemas/InboxItem'
        generated_at:
          type: string
          format: date-time
      required: [item, generated_at]

    AckInboxRequest:
      type: object
      properties:
        actor_id: { type: string }
        thread_id: { type: string }
        inbox_item_id: { type: string }
      required: [thread_id, inbox_item_id]

    OKResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]
