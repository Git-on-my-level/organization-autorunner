      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/Event' }
      required: [events]

    ArtifactResponse:
      type: object
      properties:
        artifact: { $ref: '#/components/schemas/Artifact' }
      required: [artifact]

    InboxResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/InboxItem' }
      required: [items]

    AcknowledgeInboxItemResponse:
