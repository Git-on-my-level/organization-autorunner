          items: { $ref: '#/components/schemas/Document' }
        threads:
          type: array
          items: { $ref: '#/components/schemas/Thread' }
      required: [card, events, artifacts, cards, documents, threads]

    TopicWorkspaceResponse:
      type: object
      properties:
