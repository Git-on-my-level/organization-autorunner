        primary_thread_ref: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        board_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }

    DocumentCreateInput:
      type: object
