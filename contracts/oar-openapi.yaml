      responses:
        '200':
          description: Rebuild complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OKResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

components:
  parameters:
    ThreadID:
      in: path
      name: thread_id
      required: true
      schema: { type: string }
    SnapshotID:
      in: path
      name: snapshot_id
      required: true
      schema: { type: string }
    CommitmentID:
      in: path
      name: commitment_id
      required: true
      schema: { type: string }
    EventID:
      in: path
      name: event_id
      required: true
      schema: { type: string }
    ArtifactID:
      in: path
      name: artifact_id
      required: true
      schema: { type: string }

  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    AnyObject:
      type: object
      additionalProperties: true

    HealthResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    VersionResponse:
      type: object
      properties:
        schema_version: { type: string }
      required: [schema_version]

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
          required: [code, message]
      required: [error]

    Actor:
      type: object
      additionalProperties: true

    Event:
      type: object
      additionalProperties: true

    Snapshot:
      type: object
      additionalProperties: true

    Thread:
      type: object
      additionalProperties: true

    Commitment:
      type: object
      additionalProperties: true

    Artifact:
      type: object
      additionalProperties: true

    InboxItem:
      type: object
      additionalProperties: true

    RegisterActorRequest:
      type: object
      properties:
        actor:
          $ref: '#/components/schemas/AnyObject'
      required: [actor]

    ActorResponse:
      type: object
      properties:
        actor:
          $ref: '#/components/schemas/Actor'
      required: [actor]

    ActorsResponse:
      type: object
      properties:
        actors:
          type: array
          items:
            $ref: '#/components/schemas/Actor'
      required: [actors]

    ActorOnlyRequest:
      type: object
      properties:
        actor_id: { type: string }
      required: [actor_id]

    CreateThreadRequest:
      type: object
      properties:
        actor_id: { type: string }
        thread:
          $ref: '#/components/schemas/AnyObject'
      required: [actor_id, thread]

    PatchThreadRequest:
      type: object
      properties:
        actor_id: { type: string }
        patch:
          $ref: '#/components/schemas/AnyObject'
        if_updated_at:
          type: string
          format: date-time
      required: [actor_id, patch]

    ThreadResponse:
      type: object
      properties:
        thread:
          $ref: '#/components/schemas/Thread'
      required: [thread]

    ThreadsResponse:
      type: object
      properties:
        threads:
          type: array
          items:
            $ref: '#/components/schemas/Thread'
      required: [threads]

    ThreadTimelineResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        snapshots:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Snapshot'
        artifacts:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Artifact'
      required: [events, snapshots, artifacts]

    SnapshotResponse:
      type: object
      properties:
        snapshot:
          $ref: '#/components/schemas/Snapshot'
      required: [snapshot]

    CreateCommitmentRequest:
      type: object
      properties:
        actor_id: { type: string }
        commitment:
          $ref: '#/components/schemas/AnyObject'
      required: [actor_id, commitment]

    PatchCommitmentRequest:
      type: object
      properties:
        actor_id: { type: string }
        patch:
          $ref: '#/components/schemas/AnyObject'
        refs:
          type: array
          items: { type: string }
        if_updated_at:
          type: string
          format: date-time
      required: [actor_id, patch]

    CommitmentResponse:
      type: object
      properties:
        commitment:
          $ref: '#/components/schemas/Commitment'
      required: [commitment]

    CommitmentsResponse:
      type: object
      properties:
        commitments:
          type: array
          items:
            $ref: '#/components/schemas/Commitment'
      required: [commitments]

    CreateEventRequest:
      type: object
      properties:
        actor_id: { type: string }
        event:
          $ref: '#/components/schemas/AnyObject'
      required: [actor_id, event]

    EventResponse:
      type: object
      properties:
        event:
          $ref: '#/components/schemas/Event'
      required: [event]

    CreateArtifactRequest:
      type: object
      properties:
        actor_id: { type: string }
        artifact:
          $ref: '#/components/schemas/AnyObject'
        content:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        content_type:
          type: string
      required: [actor_id, artifact, content, content_type]

    ArtifactResponse:
      type: object
      properties:
        artifact:
          $ref: '#/components/schemas/Artifact'
      required: [artifact]

    ArtifactsResponse:
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
      required: [artifacts]

    CreateWorkOrderRequest:
      type: object
      properties:
        actor_id: { type: string }
        artifact:
          $ref: '#/components/schemas/AnyObject'
        packet:
          $ref: '#/components/schemas/AnyObject'
      required: [actor_id, artifact, packet]

    CreateReceiptRequest:
      type: object
      properties:
        actor_id: { type: string }
        artifact:
          $ref: '#/components/schemas/AnyObject'
        packet:
          $ref: '#/components/schemas/AnyObject'
      required: [actor_id, artifact, packet]

    CreateReviewRequest:
      type: object
      properties:
        actor_id: { type: string }
        artifact:
          $ref: '#/components/schemas/AnyObject'
        packet:
          $ref: '#/components/schemas/AnyObject'
      required: [actor_id, artifact, packet]

    PacketCreateResponse:
      type: object
      properties:
        artifact:
          $ref: '#/components/schemas/Artifact'
        event:
          $ref: '#/components/schemas/Event'
      required: [artifact, event]

    InboxResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/InboxItem'
        generated_at:
          type: string
          format: date-time
      required: [items, generated_at]

    AckInboxRequest:
      type: object
      properties:
        actor_id: { type: string }
        thread_id: { type: string }
        inbox_item_id: { type: string }
      required: [actor_id, thread_id, inbox_item_id]

    OKResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]
