components:
  responses:
    ErrorResponse:
      description: Error payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  parameters:
    TopicID:
      in: path
      name: topic_id
      required: true
      schema: { type: string }
    ThreadID:
      in: path
      name: thread_id
      required: true
      schema: { type: string }
    DocumentID:
      in: path
      name: document_id
      required: true
      schema: { type: string }
    RevisionID:
      in: path
      name: revision_id
      required: true
      schema: { type: string }
    BoardID:
      in: path
      name: board_id
      required: true
      schema: { type: string }
    CardID:
      in: path
      name: card_id
      required: true
      schema: { type: string }
    ArtifactID:
      in: path
      name: artifact_id
      required: true
      schema: { type: string }
    EventID:
      in: path
      name: event_id
      required: true
      schema: { type: string }
    InboxID:
      in: path
      name: inbox_id
      required: true
      schema: { type: string }

  schemas:
    Error:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }
      required: [code, message]

    HealthResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    VersionResponse:
      type: object
      properties:
        schema_version: { type: string }
        command_registry_digest: { type: string }
      required: [schema_version, command_registry_digest]

    TypedRef:
      type: string
      description: Typed ref string such as `topic:roadmap` or `artifact:art_123`.

    Provenance:
      type: object
      properties:
        sources:
          type: array
          items: { type: string }
        notes: { type: string }
        by_field:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
      required: [sources]

    ProjectionFreshness:
      type: object
      properties:
        state:
          type: string
          enum: [current, pending, missing, error]
        generated_at:
          type: string
          format: date-time
        detail:
          type: string
      required: [state]

    Event:
      type: object
      properties:
        id: { type: string }
        ts: { type: string, format: date-time }
        type: { type: string }
        actor_id: { type: string }
        thread_ref: { $ref: '#/components/schemas/TypedRef' }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        summary: { type: string }
        payload:
          type: object
          additionalProperties: true
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [id, ts, type, actor_id, refs, summary, provenance]

    Artifact:
      type: object
      properties:
        id: { type: string }
        kind: { type: string }
        content_type: { type: string }
        content_hash: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        summary: { type: string }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
      required: [id, kind, content_type, content_hash, refs, created_at, created_by]

    Thread:
      type: object
      properties:
        id: { type: string }
        topic_ref: { $ref: '#/components/schemas/TypedRef' }
        title: { type: string }
        status:
          type: string
          enum: [active, archived]
        priority:
          type: string
          enum: [p0, p1, p2, p3]
        tags:
          type: array
          items: { type: string }
        latest_event_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_at: { type: string, format: date-time }
        updated_by: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [id, title, status, priority, tags, created_at, created_by, updated_at, updated_by, provenance]

    Topic:
      type: object
      properties:
        id: { type: string }
        type:
          type: string
          enum: [case, process, relationship, initiative, objective, decision, incident, risk, request, note, other]
        status:
          type: string
          enum: [proposed, active, paused, blocked, resolved, closed, archived]
        title: { type: string }
        summary: { type: string }
        thread_id:
          type: string
          description: Backing thread id for topic timeline and events.
        owner_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        board_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_at: { type: string, format: date-time }
        updated_by: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required:
        [id, type, status, title, summary, owner_refs, document_refs, board_refs, related_refs,
         created_at, created_by, updated_at, updated_by, provenance]

    Document:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        subject_ref: { $ref: '#/components/schemas/TypedRef' }
        head_revision_ref: { $ref: '#/components/schemas/TypedRef' }
        state: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_at: { type: string, format: date-time }
        updated_by: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required:
        [id, title, subject_ref, head_revision_ref, state, refs, created_at, created_by, updated_at, updated_by, provenance]

    DocumentRevision:
      type: object
      properties:
        revision_id: { type: string }
        document_ref: { $ref: '#/components/schemas/TypedRef' }
        prev_revision_ref: { $ref: '#/components/schemas/TypedRef' }
        artifact_ref: { $ref: '#/components/schemas/TypedRef' }
        revision_number: { type: integer }
        summary: { type: string }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
      required: [revision_id, document_ref, artifact_ref, revision_number, created_at, created_by]

    Board:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        thread_id:
          type: string
          description: Backing thread id for board timeline and events.
        status:
          type: string
          enum: [active, paused, closed]
        primary_topic_ref: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        card_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        pinned_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_at: { type: string, format: date-time }
        updated_by: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required:
        [id, title, status, document_refs, card_refs, pinned_refs, created_at, created_by, updated_at, updated_by, provenance]

    Card:
      type: object
      properties:
        id: { type: string }
        board_ref: { $ref: '#/components/schemas/TypedRef' }
        topic_ref: { $ref: '#/components/schemas/TypedRef' }
        thread_id:
          type: string
          description: Backing thread id for card timeline and packet lifecycle (always set for persisted cards).
        document_ref: { $ref: '#/components/schemas/TypedRef' }
        title: { type: string }
        summary: { type: string }
        column_key:
          type: string
          enum: [backlog, ready, in_progress, blocked, review, done]
        rank: { type: string }
        assignee_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        due_at:
          type: string
          format: date-time
          nullable: true
          description: Optional due instant for the work item.
        definition_of_done:
          type: array
          items: { type: string }
          description: Acceptance lines for completing the card.
        risk:
          type: string
          enum: [low, medium, high, critical]
        resolution:
          type: string
          nullable: true
          enum: [done, canceled]
          description: Null while the card is active; terminal `done` or `canceled` when resolved.
        resolution_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_at: { type: string, format: date-time }
        updated_by: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
        archived_at: { type: string, format: date-time }
        archived_by: { type: string }
        trashed_at: { type: string, format: date-time }
        trashed_by: { type: string }
        trash_reason: { type: string }
      required:
        [id, board_ref, thread_id, title, summary, column_key, rank, assignee_refs, risk, resolution_refs,
         related_refs, created_at, created_by, updated_at, updated_by, provenance]

    BoardSummary:
      type: object
      properties:
        card_count: { type: integer }
        cards_by_column:
          type: object
          additionalProperties: { type: integer }
        unresolved_card_count: { type: integer }
        resolved_card_count: { type: integer }
        document_count: { type: integer }
        latest_activity_at: { type: string, format: date-time }
        has_document_refs: { type: boolean }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
      required: [card_count, cards_by_column, unresolved_card_count, resolved_card_count, document_count]

    BoardCardSummary:
      type: object
      properties:
        related_topic_count: { type: integer }
        document_count: { type: integer }
        inbox_count: { type: integer }
        latest_activity_at: { type: string, format: date-time }
        stale: { type: boolean }
      required: [related_topic_count, document_count, inbox_count, stale]

    BoardWorkspaceCard:
      type: object
      properties:
        card: { $ref: '#/components/schemas/Card' }
        summary: { $ref: '#/components/schemas/BoardCardSummary' }
        projection_freshness: { $ref: '#/components/schemas/ProjectionFreshness' }
      required: [card, summary, projection_freshness]

    BoardMembership:
      type: object
      properties:
        board_ref: { $ref: '#/components/schemas/TypedRef' }
        board_title: { type: string }
        column_key:
          type: string
          enum: [backlog, ready, in_progress, blocked, review, done]
      required: [board_ref, board_title, column_key]

    InboxItem:
      type: object
      properties:
        id: { type: string }
        category:
          type: string
          enum: [decision_needed, intervention_needed, stale_topic, work_item_risk, document_attention]
        subject_ref: { $ref: '#/components/schemas/TypedRef' }
        source_event_ref: { $ref: '#/components/schemas/TypedRef' }
        title: { type: string }
        recommended_action: { type: string }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
      required: [id, category, subject_ref, title, recommended_action, related_refs]

    TopicWriteInput:
      type: object
      properties:
        type:
          type: string
          enum: [case, process, relationship, initiative, objective, decision, incident, risk, request, note, other]
        status:
          type: string
          enum: [proposed, active, paused, blocked, resolved, closed, archived]
        title: { type: string }
        summary: { type: string }
        owner_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        board_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [type, status, title, summary, owner_refs, document_refs, board_refs, related_refs, provenance]

    TopicPatchInput:
      type: object
      properties:
        type:
          type: string
          enum: [case, process, relationship, initiative, objective, decision, incident, risk, request, note, other]
        status:
          type: string
          enum: [proposed, active, paused, blocked, resolved, closed, archived]
        title: { type: string }
        summary: { type: string }
        owner_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        board_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }

    DocumentCreateInput:
      type: object
      properties:
        title: { type: string }
        subject_ref: { $ref: '#/components/schemas/TypedRef' }
        body_markdown: { type: string }
        summary: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [title, subject_ref, body_markdown, refs, provenance]

    DocumentRevisionCreateInput:
      type: object
      properties:
        body_markdown: { type: string }
        summary: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [body_markdown, refs, provenance]

    BoardCreateInput:
      type: object
      properties:
        title: { type: string }
        status:
          type: string
          enum: [active, paused, closed]
        primary_topic_ref: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        pinned_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [title, status, document_refs, pinned_refs, provenance]

    BoardPatchInput:
      type: object
      properties:
        title: { type: string }
        status:
          type: string
          enum: [active, paused, closed]
        primary_topic_ref: { $ref: '#/components/schemas/TypedRef' }
        document_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        pinned_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        provenance: { $ref: '#/components/schemas/Provenance' }

    CardCreateInput:
      type: object
      properties:
        id: { type: string }
        topic_ref: { $ref: '#/components/schemas/TypedRef' }
        document_ref: { $ref: '#/components/schemas/TypedRef' }
        title: { type: string }
        summary: { type: string }
        column_key:
          type: string
          enum: [backlog, ready, in_progress, blocked, review, done]
        before_card_id:
          type: string
          description: Optional neighbor card id for initial ordering within column_key.
        after_card_id:
          type: string
          description: Optional neighbor card id for initial ordering; mutually exclusive with before_card_id.
        assignee_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        risk:
          type: string
          enum: [low, medium, high, critical]
        resolution:
          type: string
          nullable: true
          enum: [done, canceled]
        resolution_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        due_at:
          type: string
          format: date-time
          nullable: true
        definition_of_done:
          type: array
          items: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required:
        [title, summary, column_key, assignee_refs, risk, resolution_refs, related_refs, provenance]

    CardPatchInput:
      type: object
      properties:
        topic_ref: { $ref: '#/components/schemas/TypedRef' }
        document_ref: { $ref: '#/components/schemas/TypedRef' }
        title: { type: string }
        summary: { type: string }
        assignee_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        risk:
          type: string
          enum: [low, medium, high, critical]
        resolution:
          type: string
          nullable: true
          enum: [done, canceled]
        resolution_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        due_at:
          type: string
          format: date-time
          nullable: true
        definition_of_done:
          type: array
          items: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }

    MoveCardInput:
      type: object
      properties:
        column_key:
          type: string
          enum: [backlog, ready, in_progress, blocked, review, done]
        before_card_id:
          type: string
          description: Insert immediately before this card id in column_key; mutually exclusive with after_card_id.
        after_card_id:
          type: string
          description: Insert immediately after this card id in column_key; mutually exclusive with before_card_id.
        resolution:
          type: string
          enum: [done, canceled]
        resolution_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        if_board_updated_at:
          type: string
          format: date-time
          description: Parent board optimistic concurrency token; required for moves that update column/rank (matches core).
      required: [column_key, if_board_updated_at]

    ReceiptPacket:
      type: object
      properties:
        receipt_id: { type: string }
        subject_ref:
          allOf:
            - $ref: '#/components/schemas/TypedRef'
          description: MUST be card:<card_id>.
        outputs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        verification_evidence:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        changes_summary: { type: string }
        known_gaps:
          type: array
          items: { type: string }
      required:
        [receipt_id, subject_ref, outputs, verification_evidence, changes_summary, known_gaps]

    ReviewPacket:
      type: object
      properties:
        review_id: { type: string }
        subject_ref:
          allOf:
            - $ref: '#/components/schemas/TypedRef'
          description: MUST be card:<card_id>.
        receipt_ref: { $ref: '#/components/schemas/TypedRef' }
        outcome:
          type: string
          enum: [accept, revise, escalate]
        notes: { type: string }
        evidence_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
      required: [review_id, subject_ref, receipt_ref, outcome, notes, evidence_refs]

    EventCreateInput:
      type: object
      properties:
        type: { type: string }
        actor_id: { type: string }
        thread_ref: { $ref: '#/components/schemas/TypedRef' }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        summary: { type: string }
        payload:
          type: object
          additionalProperties: true
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [type, actor_id, refs, summary, provenance]

    CreateTopicRequest:
      type: object
      properties:
        topic: { $ref: '#/components/schemas/TopicWriteInput' }
      required: [topic]

    PatchTopicRequest:
      type: object
      properties:
        patch: { $ref: '#/components/schemas/TopicPatchInput' }
        if_updated_at:
          type: string
          format: date-time
      required: [patch]

    CreateDocumentRequest:
      type: object
      properties:
        document: { $ref: '#/components/schemas/DocumentCreateInput' }
      required: [document]

    CreateDocumentRevisionRequest:
      type: object
      properties:
        revision: { $ref: '#/components/schemas/DocumentRevisionCreateInput' }
        if_document_updated_at:
          type: string
          format: date-time
        if_base_revision:
          type: string
          description: >
            Optional base revision id for optimistic concurrency (must match the document head
            when appending from the current tip). When omitted with the nested `revision` envelope,
            the server defaults to the document head revision.
      required: [revision]

    CreateBoardRequest:
      type: object
      properties:
        board: { $ref: '#/components/schemas/BoardCreateInput' }
      required: [board]

    PatchBoardRequest:
      type: object
      properties:
        patch: { $ref: '#/components/schemas/BoardPatchInput' }
        if_updated_at:
          type: string
          format: date-time
      required: [patch]

    CreateCardRequest:
      type: object
      properties:
        board_id:
          type: string
          description: >
            Target board for POST /cards. Required unless board_ref is set. Ignored for
            POST /boards/{board_id}/cards (path segment is authoritative).
        board_ref:
          allOf:
            - $ref: '#/components/schemas/TypedRef'
          description: Alternative to board_id; MUST be board:<board_id> for POST /cards.
        card: { $ref: '#/components/schemas/CardCreateInput' }
        if_board_updated_at:
          type: string
          format: date-time
      required: [card]

    PatchCardRequest:
      type: object
      properties:
        patch: { $ref: '#/components/schemas/CardPatchInput' }
        if_updated_at:
          type: string
          format: date-time
      required: [patch]

    MoveCardRequest:
      description: >
        Flat card move body aligned with refactor spec §8.1 (`column_key`, optional placement
        hints, optional terminal resolution). Clients MAY also send a legacy nested
        `move` object with the same fields; core flattens it when `column_key` is not set at the root.
      allOf:
        - $ref: '#/components/schemas/MoveCardInput'
        - type: object
          properties:
            actor_id:
              type: string
              description: Optional actor performing the move (may also be supplied via auth headers).
            move:
              $ref: '#/components/schemas/MoveCardInput'
              deprecated: true
              description: Legacy envelope; prefer flat top-level fields. Ignored when `column_key` is set at the root.

    CreateReceiptRequest:
      type: object
      properties:
        packet: { $ref: '#/components/schemas/ReceiptPacket' }
      required: [packet]

    CreateReviewRequest:
      type: object
      properties:
        packet: { $ref: '#/components/schemas/ReviewPacket' }
      required: [packet]

    CreateEventRequest:
      type: object
      properties:
        event: { $ref: '#/components/schemas/EventCreateInput' }
      required: [event]

    AcknowledgeInboxItemRequest:
      type: object
      description: >
        Acknowledges a derived inbox item. `subject_ref` is the typed subject anchor for the item
        (same pattern as packet requests); it must match the inbox item's subject (for example
        `thread:<id>` or `topic:<id>`).
      properties:
        actor_id: { type: string }
        subject_ref: { $ref: '#/components/schemas/TypedRef' }
        inbox_item_id:
          type: string
          description: Required when using legacy POST /inbox/ack; must match path inbox_id when using POST /inbox/{inbox_id}/acknowledge.
        note: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
      required: [subject_ref]

    TopicLifecycleMutationRequest:
      type: object
      properties:
        actor_id: { type: string }

    TopicTrashRequest:
      type: object
      properties:
        actor_id: { type: string }
        reason: { type: string }
      required: [reason]

    BoardLifecycleMutationRequest:
      type: object
      properties:
        actor_id: { type: string }

    BoardOnlyResponse:
      type: object
      properties:
        board: { $ref: '#/components/schemas/Board' }
      required: [board]

    PurgeBoardRequest:
