    CreateWorkOrderRequest:
      type: object
      properties:
        packet: { $ref: '#/components/schemas/WorkOrderPacket' }
      required: [packet]

    CreateReceiptRequest:
      type: object
      properties:
        packet: { $ref: '#/components/schemas/ReceiptPacket' }
      required: [packet]

    CreateReviewRequest:
      type: object
      properties:
        packet: { $ref: '#/components/schemas/ReviewPacket' }
      required: [packet]

    CreateEventRequest:
      type: object
      properties:
        event: { $ref: '#/components/schemas/EventCreateInput' }
      required: [event]

    AcknowledgeInboxItemRequest:
      type: object
      description: >
        Acknowledges a derived inbox item. `subject_ref` is the typed subject anchor for the item
        (same pattern as packet requests); it must match the inbox item's subject (for example
        `thread:<id>` or `topic:<id>`).
      properties:
        actor_id: { type: string }
        subject_ref: { $ref: '#/components/schemas/TypedRef' }
        inbox_item_id:
          type: string
          description: Required when using legacy POST /inbox/ack; must match path inbox_id when using POST /inbox/{inbox_id}/acknowledge.
        note: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
      required: [subject_ref]

    TopicResponse:
      type: object
      properties:
        topic: { $ref: '#/components/schemas/Topic' }
      required: [topic]

    TopicsResponse:
      type: object
      properties:
        topics:
          type: array
          items: { $ref: '#/components/schemas/Topic' }
      required: [topics]

    TopicTimelineResponse:
      type: object
      properties:
        topic: { $ref: '#/components/schemas/Topic' }
        events:
          type: array
          items: { $ref: '#/components/schemas/Event' }
        artifacts:
          type: array
          items: { $ref: '#/components/schemas/Artifact' }
        cards:
          type: array
          items: { $ref: '#/components/schemas/Card' }
