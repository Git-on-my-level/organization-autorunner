services:
  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    restart: unless-stopped
    ports:
      - "${OAR_CORE_PORT:-8000}:8000"
    volumes:
      - oar-workspace:/var/lib/oar/workspace
    environment:
      OAR_LISTEN_ADDR: "0.0.0.0:8000"
      OAR_ALLOW_UNAUTHENTICATED_WRITES: "${OAR_ALLOW_UNAUTHENTICATED_WRITES:-false}"
      OAR_CORS_ALLOWED_ORIGINS: "${OAR_CORS_ALLOWED_ORIGINS:-}"
      OAR_WEBAUTHN_RPID: "${OAR_WEBAUTHN_RPID:-}"
      OAR_WEBAUTHN_ORIGIN: "${OAR_WEBAUTHN_ORIGIN:-}"
      OAR_WEBAUTHN_RP_DISPLAY_NAME: "${OAR_WEBAUTHN_RP_DISPLAY_NAME:-OAR}"
      OAR_SHUTDOWN_TIMEOUT: "${OAR_SHUTDOWN_TIMEOUT:-15s}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 5s
      retries: 3

  web-ui:
    build:
      context: .
      dockerfile: web-ui/Dockerfile
    restart: unless-stopped
    ports:
      - "${OAR_WEB_UI_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      ORIGIN: "${OAR_WEB_UI_ORIGIN:-http://localhost:3000}"
      OAR_CORE_BASE_URL: "http://core:8000"
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  oar-workspace:
