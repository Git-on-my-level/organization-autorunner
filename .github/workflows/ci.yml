name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      automation: ${{ steps.filter.outputs.automation }}
      go_shared: ${{ steps.filter.outputs.go_shared }}
      node_shared: ${{ steps.filter.outputs.node_shared }}
      contracts: ${{ steps.filter.outputs.contracts }}
      core: ${{ steps.filter.outputs.core }}
      cli: ${{ steps.filter.outputs.cli }}
      web_ui: ${{ steps.filter.outputs.web_ui }}
      auth_e2e_smoke: ${{ steps.filter.outputs.auth_e2e_smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            automation:
              - '.github/**'
            go_shared:
              - '.github/actions/setup-go/**'
              - '.github/workflows/ci.yml'
            node_shared:
              - '.github/actions/setup-node-pnpm/**'
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
            contracts:
              - 'contracts/**'
              - 'scripts/contract-*'
              - 'core/cmd/contract-gen/**'
            core:
              - 'core/**'
            cli:
              - 'cli/**'
              - 'VERSION'
              - 'scripts/read-version.sh'
              - 'scripts/set-version.sh'
              - 'scripts/sync-version.sh'
            web_ui:
              - 'web-ui/**'
            auth_e2e_smoke:
              - 'contracts/**'
              - 'core/cmd/oar-core/**'
              - 'core/internal/auth/**'
              - 'core/internal/server/**'
              - 'scripts/e2e-smoke'

  workflow-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.automation == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node And pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Check GitHub automation formatting
        run: pnpm -C web-ui exec prettier --check "../.github/**/*.{yml,yaml}"

  contracts-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.go_shared == 'true' || needs.changes.outputs.node_shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Setup Node And pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify generated contracts
        run: ./scripts/contract-check

  core-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.contracts == 'true' || needs.changes.outputs.go_shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Run core check
        run: make -C core check-ci

  cli-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.contracts == 'true' || needs.changes.outputs.go_shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Verify version metadata
        run: ./scripts/sync-version.sh --check

      - name: Run CLI check
        working-directory: cli
        run: go test ./...

  web-ui-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.web_ui == 'true' || needs.changes.outputs.contracts == 'true' || needs.changes.outputs.node_shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node And pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run web-ui check
        run: make -C web-ui check

      - name: Build web-ui
        run: pnpm -C web-ui run build

  auth-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.auth_e2e_smoke == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Setup Node And pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run end-to-end smoke
        env:
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/.tmp/e2e-smoke
        run: make e2e-smoke

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: auth-e2e-smoke-artifacts
          path: .tmp/e2e-smoke/**
          if-no-files-found: ignore
