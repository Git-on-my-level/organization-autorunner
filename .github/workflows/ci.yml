name: CI

on:
  push:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      web_ui: ${{ steps.filter.outputs.web_ui }}
      root: ${{ steps.filter.outputs.root }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            root:
              - '.github/workflows/**'
              - 'Makefile'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
            contracts:
              - 'contracts/**'
              - 'scripts/contract-*'
              - 'core/cmd/contract-gen/**'
            core:
              - 'core/**'
            web_ui:
              - 'web-ui/**'

  contracts-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.root == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify generated contracts
        run: make contract-check

  core-checks:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.root == 'true' || needs.changes.outputs.contracts == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Run core check
        run: make -C core check

  web-ui-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.web_ui == 'true' || needs.changes.outputs.root == 'true' || needs.changes.outputs.contracts == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web-ui check
        run: make -C web-ui check
