name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      automation: ${{ steps.filter.outputs.automation }}
      go_shared: ${{ steps.filter.outputs.go_shared }}
      node_shared: ${{ steps.filter.outputs.node_shared }}
      contracts: ${{ steps.filter.outputs.contracts }}
      core: ${{ steps.filter.outputs.core }}
      cli: ${{ steps.filter.outputs.cli }}
      web_ui: ${{ steps.filter.outputs.web_ui }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            automation:
              - '.github/**'
            go_shared:
              - '.github/actions/setup-go/**'
              - '.github/workflows/ci.yml'
            node_shared:
              - '.github/actions/setup-node-pnpm/**'
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
            contracts:
              - 'contracts/**'
              - 'scripts/contract-*'
              - 'core/cmd/contract-gen/**'
            core:
              - 'core/**'
            cli:
              - 'cli/**'
            web_ui:
              - 'web-ui/**'

  workflow-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.automation == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node And pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Check GitHub automation formatting
        run: pnpm -C web-ui exec prettier --check "../.github/**/*.{yml,yaml}"

  contracts-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.go_shared == 'true' || needs.changes.outputs.node_shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Setup Node And pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify generated contracts
        run: ./scripts/contract-check

  core-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.contracts == 'true' || needs.changes.outputs.go_shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Run core check
        run: make -C core check-ci

  cli-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.contracts == 'true' || needs.changes.outputs.go_shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Run CLI check
        working-directory: cli
        run: go test ./...

  web-ui-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.web_ui == 'true' || needs.changes.outputs.contracts == 'true' || needs.changes.outputs.node_shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node And pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run web-ui check
        run: make -C web-ui check

      - name: Build web-ui
        run: pnpm -C web-ui run build
