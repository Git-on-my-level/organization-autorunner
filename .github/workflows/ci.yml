name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      run_e2e_smoke:
        description: Run end-to-end smoke validation
        required: false
        default: false
        type: boolean

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      cli: ${{ steps.filter.outputs.cli }}
      web_ui: ${{ steps.filter.outputs.web_ui }}
      root: ${{ steps.filter.outputs.root }}
      contracts: ${{ steps.filter.outputs.contracts }}
      hosted: ${{ steps.filter.outputs.hosted }}
      saas: ${{ steps.filter.outputs.saas }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            root:
              - '.github/workflows/**'
              - 'Makefile'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
            contracts:
              - 'contracts/**'
              - 'scripts/contract-*'
              - 'core/cmd/contract-gen/**'
            core:
              - 'core/**'
            cli:
              - 'cli/**'
            web_ui:
              - 'web-ui/**'
            e2e:
              - 'scripts/e2e-smoke'
            hosted:
              - 'core/**'
              - 'contracts/**'
              - 'web-ui/**'
              - 'scripts/hosted/**'
              - 'scripts/hosted-smoke'
              - 'deploy/**'
              - '.github/workflows/ci.yml'
            saas:
              - 'core/**'
              - 'contracts/**'
              - 'web-ui/**'
              - 'scripts/**'
              - 'deploy/**'
              - 'docs/**'
              - 'runbooks/**'
              - '.github/workflows/ci.yml'
              - 'Makefile'

  contracts-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.root == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify generated contracts
        run: make contract-check

  core-checks:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.root == 'true' || needs.changes.outputs.contracts == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Run core check
        run: make -C core check

  cli-checks:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.root == 'true' || needs.changes.outputs.contracts == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Run CLI check
        run: make cli-check

  web-ui-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.web_ui == 'true' || needs.changes.outputs.root == 'true' || needs.changes.outputs.contracts == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web-ui check
        run: make -C web-ui check

      - name: Build web-ui
        run: pnpm -C web-ui run build

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e_smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run end-to-end smoke
        env:
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/.tmp/e2e-smoke
        run: make e2e-smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: .tmp/e2e-smoke/**
          if-no-files-found: ignore

  hosted-checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout_minutes }}
    needs: changes
    if: needs.changes.outputs.hosted == 'true' || needs.changes.outputs.root == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hosted-ops-test
            timeout_minutes: 15
            make_target: hosted-ops-test
            artifact_name: ""
            artifact_path: ""
          - name: hosted-smoke
            timeout_minutes: 20
            make_target: hosted-smoke
            artifact_name: hosted-smoke-artifacts
            artifact_path: .tmp/hosted-smoke/**
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Run ${{ matrix.name }}
        env:
          HOSTED_SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/.tmp/hosted-smoke
        run: make ${{ matrix.make_target }}

      - name: Upload hosted artifacts
        if: always() && matrix.artifact_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: ignore

  saas-checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout_minutes }}
    needs: changes
    if: needs.changes.outputs.saas == 'true' || needs.changes.outputs.root == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: saas-smoke
            timeout_minutes: 20
            make_target: saas-smoke
            artifact_name: saas-smoke-artifacts
            artifact_path: .tmp/saas-smoke/**
          - name: saas-e2e
            timeout_minutes: 25
            make_target: saas-e2e
            artifact_name: saas-e2e-artifacts
            artifact_path: .tmp/saas-e2e/**
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Run ${{ matrix.name }}
        env:
          SAAS_SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/.tmp/saas-smoke
          SAAS_E2E_ARTIFACT_DIR: ${{ github.workspace }}/.tmp/saas-e2e
        run: make ${{ matrix.make_target }}

      - name: Upload SaaS artifacts
        if: always() && matrix.artifact_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: ignore

  saas-load-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.saas == 'true' || needs.changes.outputs.root == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Run saas-load-smoke
        env:
          SAAS_LOAD_ARTIFACT_DIR: ${{ github.workspace }}/.tmp/saas-load-smoke
          SAAS_LOAD_NUM_WORKSPACES: 2
          SAAS_LOAD_NUM_THREADS: 3
          SAAS_LOAD_CONCURRENT: 2
        run: make saas-load-smoke

      - name: Upload saas-load-smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saas-load-smoke-artifacts
          path: .tmp/saas-load-smoke/**
          if-no-files-found: ignore
