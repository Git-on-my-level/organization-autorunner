name: CI

on:
  push:

jobs:
  fast-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run lint
        run: ./scripts/lint

      - name: Run fast unit tests
        run: go test ./internal/actors ./internal/primitives ./internal/schema ./internal/storage -count=1
