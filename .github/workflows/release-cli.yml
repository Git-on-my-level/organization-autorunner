name: Release CLI

on:
  push:
    tags:
      - 'v*'
      - 'oar-cli-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build CLI archive
        id: build
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME}"
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"
          TARGET="oar_${VERSION}_${GOOS}_${GOARCH}"

          mkdir -p dist
          STAGE_DIR="dist/${TARGET}"
          mkdir -p "$STAGE_DIR"

          BIN_NAME="oar"
          BIN_EXT=""
          if [[ "$GOOS" == "windows" ]]; then
            BIN_EXT=".exe"
          fi

          (
            cd cli
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags="-s -w -X organization-autorunner-cli/internal/httpclient.CLIVersion=${VERSION}" -o "../${STAGE_DIR}/${BIN_NAME}${BIN_EXT}" ./cmd/oar
          )

          if [[ "$GOOS" == "windows" ]]; then
            ARCHIVE="dist/${TARGET}.zip"
            (
              cd "$STAGE_DIR"
              zip -q "../$(basename "$ARCHIVE")" "${BIN_NAME}${BIN_EXT}"
            )
          else
            ARCHIVE="dist/${TARGET}.tar.gz"
            tar -C "$STAGE_DIR" -czf "$ARCHIVE" "${BIN_NAME}${BIN_EXT}"
          fi

          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.build.outputs.archive }}

  checksums:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums.txt

  publish:
    runs-on: ubuntu-latest
    needs: [build, checksums]
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
