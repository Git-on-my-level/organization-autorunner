name: Release CLI

on:
  push:
    tags:
      - "v*"
      - "oar-cli-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              TARGET="oar_${VERSION}_${GOOS}_${GOARCH}"
              STAGE_DIR="dist/${TARGET}"
              mkdir -p "$STAGE_DIR"

              BIN_NAME="oar"
              BIN_EXT=""
              if [[ "$GOOS" == "windows" ]]; then
                BIN_EXT=".exe"
              fi

              (
                cd cli
                CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
                  -trimpath \
                  -ldflags="-s -w -X organization-autorunner-cli/internal/httpclient.CLIVersion=${VERSION}" \
                  -o "../${STAGE_DIR}/${BIN_NAME}${BIN_EXT}" \
                  ./cmd/oar
              )

              if [[ "$GOOS" == "windows" ]]; then
                (
                  cd "$STAGE_DIR"
                  zip -q "../${TARGET}.zip" "${BIN_NAME}${BIN_EXT}"
                )
              else
                tar -C "$STAGE_DIR" -czf "dist/${TARGET}.tar.gz" "${BIN_NAME}${BIN_EXT}"
              fi
            done
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
