name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Verify release version
        run: ./scripts/set-version.sh --check "${GITHUB_REF_NAME}"

      - name: Build release artifacts
        run: ./scripts/build-cli-release-artifacts.sh "${GITHUB_REF_NAME}" dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=(dist/*.tar.gz dist/*.zip dist/checksums.txt)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "no release artifacts found in dist/" >&2
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            existing_assets="$(
              gh release view "${GITHUB_REF_NAME}" \
                --json assets \
                --jq '.assets[].name'
            )"

            upload_assets=()
            for asset in "${assets[@]}"; do
              asset_name="$(basename "${asset}")"
              if grep -Fxq "${asset_name}" <<< "${existing_assets}"; then
                echo "Release asset already exists, leaving in place: ${asset_name}"
                continue
              fi
              upload_assets+=("${asset}")
            done

            if [[ ${#upload_assets[@]} -eq 0 ]]; then
              echo "All release assets already exist for ${GITHUB_REF_NAME}"
              exit 0
            fi

            gh release upload "${GITHUB_REF_NAME}" "${upload_assets[@]}"
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" --generate-notes --verify-tag
          fi
