name: Setup Node And pnpm
description: Set up pnpm, restore the workspace cache, and install dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "20"
  cache-dependency-path:
    description: Lockfile path used for pnpm cache keys.
    required: false
    default: pnpm-lock.yaml
  install-command:
    description: Command used to install workspace dependencies.
    required: false
    default: pnpm install --frozen-lockfile

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v5.0.0

    - name: Setup Node.js
      uses: actions/setup-node@v6.3.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install dependencies
      shell: bash
      run: ${{ inputs.install-command }}
